<!DOCTYPE html><html lang="sk"><head><meta charset="utf-8"><title>Meta token</title></head>
<body style="background:#111;color:#eee;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh">
<div id="msg">Prenášam token…</div>
<script>
// Jednorazová pomôcka: prenesie CAPI token z Events Managera do servera bez toho,
// aby prešiel cez chat/git. Token je v URL FRAGMENTE (#...) — fragment sa neposiela
// na server ani do logov; číta sa len tu v prehliadači a POST-ne sa same-origin.
(async()=>{
  const el=document.getElementById('msg');
  try{
    const h=new URLSearchParams(location.hash.slice(1));
    const t=h.get('t')||'', k=h.get('k')||'';
    history.replaceState({},'',location.pathname); // hneď zmaž fragment z adresy
    if(!/^EAA[0-9A-Za-z]{50,}$/.test(t)||!k){ el.textContent='Chýba token.'; return; }
    const r=await fetch('/api/meta-token',{method:'POST',headers:{'Content-Type':'application/json','X-Import-Token':k},body:JSON.stringify({token:t})});
    const d=await r.json().catch(()=>({}));
    el.textContent = (r.ok&&d.ok) ? '✅ Token uložený ('+d.len+' znakov). Toto okno môžeš zavrieť.' : '❌ Chyba: HTTP '+r.status;
  }catch(e){ el.textContent='❌ '+e.message; }
})();
</script></body></html>
