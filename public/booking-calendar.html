<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kalendár rezervácií – Fusion Academy</title>
<link rel="stylesheet" href="/fa-theme.css">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{--gold:#C9A84C;--gold-dim:rgba(201,168,76,.15);--gold-border:rgba(201,168,76,.35);
    --bg:#0f0f0f;--card:#1a1a1a;--border:#2a2a2a;--cream:#f5edd6;--muted:#8a8a8a;--green:#4ade80;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--cream);font-family:'Segoe UI',system-ui,sans-serif;padding-bottom:40px}
  a{color:inherit}
  .topbar{position:sticky;top:0;z-index:50;background:rgba(15,15,15,.97);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--gold-border);display:flex;align-items:center;gap:12px;padding:12px 16px}
  .topbar .brand{font-weight:800;color:var(--gold);font-size:1rem;display:flex;align-items:center;gap:8px;text-decoration:none}
  .topbar .back{margin-left:auto;color:var(--muted);text-decoration:none;font-size:.85rem;display:inline-flex;align-items:center;gap:5px}
  .topbar .back:hover{color:var(--gold)}
  .wrap{max-width:900px;margin:0 auto;padding:18px 16px}

  /* Day navigator */
  .daynav{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .daynav button{background:var(--card);border:1px solid var(--border);color:var(--cream);
    width:44px;height:44px;border-radius:12px;cursor:pointer;font-size:1.1rem;transition:.2s;flex-shrink:0}
  .daynav button:hover{border-color:var(--gold-border);color:var(--gold)}
  .daynav .daylabel{flex:1;text-align:center}
  .daynav .dl-main{font-size:1.15rem;font-weight:800;text-transform:capitalize}
  .daynav .dl-sub{font-size:.78rem;color:var(--muted)}
  .todaybtn{display:block;margin:0 auto 14px;background:var(--gold-dim);border:1px solid var(--gold-border);
    color:var(--gold);padding:5px 16px;border-radius:20px;font-size:.78rem;font-weight:700;cursor:pointer}
  .todaybtn.hidden{display:none}
  input[type=date]{background:var(--card);border:1px solid var(--border);color:var(--cream);border-radius:10px;padding:8px 10px;font-size:.85rem;color-scheme:dark}

  /* Class list */
  .cls{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:12px;overflow:hidden;
    animation:fade .35s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .cls-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
  .cls-head:hover{background:rgba(201,168,76,.04)}
  .cls-emoji{font-size:1.7rem;width:40px;text-align:center;flex-shrink:0}
  .cls-info{flex:1;min-width:0}
  .cls-name{font-weight:700;font-size:.98rem}
  .cls-meta{font-size:.77rem;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;margin-top:3px}
  .cls-count{flex-shrink:0;text-align:right}
  .cls-count .num{font-weight:800;font-size:1.05rem}
  .cls-count .cap{font-size:.72rem;color:var(--muted)}
  .cls-chevron{color:var(--muted);transition:transform .25s;flex-shrink:0}
  .cls.open .cls-chevron{transform:rotate(180deg)}
  .cls-body{display:none;border-top:1px solid var(--border);padding:14px 16px;background:rgba(0,0,0,.15)}
  .cls.open .cls-body{display:block;animation:fade .3s ease both}

  .att-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;background:#151515;margin-bottom:6px}
  .att-row .a-name{flex:1;font-size:.88rem;font-weight:600}
  .att-row .a-badge{font-size:.68rem;padding:2px 8px;border-radius:20px;white-space:nowrap}
  .att-row .a-del{background:rgba(244,67,54,.12);color:#f87171;border:1px solid rgba(244,67,54,.25);
    border-radius:8px;padding:3px 9px;cursor:pointer;font-size:.72rem}
  .att-empty{color:var(--muted);font-size:.83rem;text-align:center;padding:8px 0 14px}

  .add-wrap{margin-top:12px;border-top:2px solid var(--gold-border);padding-top:12px}
  .add-title{font-size:.8rem;color:var(--gold);font-weight:700;margin-bottom:8px}
  .search-box{position:relative}
  .search-box i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem}
  .search-box input{width:100%;background:#151515;border:1px solid var(--border);color:var(--cream);
    padding:10px 12px 10px 34px;border-radius:10px;font-size:.88rem;outline:none}
  .search-box input:focus{border-color:var(--gold-border)}
  .results{margin-top:6px;background:#151515;border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .res-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04)}
  .res-item:last-child{border-bottom:none}
  .res-item:hover{background:rgba(201,168,76,.08)}
  .res-item .r-name{flex:1;font-size:.86rem;font-weight:600}
  .res-item .r-sub{font-size:.72rem;color:var(--muted)}
  .freechk{display:flex;align-items:center;gap:7px;margin-top:10px;font-size:.82rem;color:var(--muted);cursor:pointer;user-select:none}
  .freechk input{width:16px;height:16px;accent-color:var(--gold)}
  .empty-day{text-align:center;padding:50px 20px;color:var(--muted)}
  .empty-day .e-emoji{font-size:2.6rem;margin-bottom:10px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;
    background:#2e7d32;color:#fff;padding:11px 20px;border-radius:10px;font-size:.88rem;opacity:0;
    transition:.3s;pointer-events:none;max-width:90%}
  .toast.show{opacity:1}
  .toast.err{background:#c62828}
  .spin{animation:sp .7s linear infinite;display:inline-block}@keyframes sp{to{transform:rotate(360deg)}}

  /* client picker */
  .picker-controls{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
  .pk-city{background:#151515;border:1px solid var(--border);color:var(--cream);border-radius:10px;padding:9px 12px;font-size:.86rem;outline:none;color-scheme:dark}
  .pk-city:focus{border-color:var(--gold-border)}
  .pk-chips{display:flex;gap:6px;flex-wrap:wrap}
  .pk-chip{background:#151515;border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:5px 12px;font-size:.78rem;font-weight:600;cursor:pointer;transition:.15s}
  .pk-chip:hover{border-color:var(--gold-border);color:var(--cream)}
  .pk-chip.active{background:var(--gold-dim);border-color:var(--gold-border);color:var(--gold)}
  .pk-row{display:flex;align-items:center;gap:10px;background:#151515;border:1px solid var(--border);border-radius:12px;padding:9px 12px;margin-bottom:6px;animation:fade .25s ease both}
  .pk-info{flex:1;min-width:0}
  .pk-name{font-size:.9rem;font-weight:700}
  .pk-sub{font-size:.75rem;color:var(--muted);margin-top:1px}
  .pk-actions{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
  .pk-book{border:1px solid transparent;border-radius:8px;padding:5px 10px;font-size:.76rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:.15s}
  .pk-book:hover{transform:translateY(-1px)}
  .pk-mem{background:rgba(201,168,76,.16);color:var(--gold);border-color:rgba(201,168,76,.35)}
  .pk-pass{background:rgba(96,165,250,.14);color:#60a5fa;border-color:rgba(96,165,250,.3)}
  .pk-free{background:rgba(74,222,128,.13);color:#4ade80;border-color:rgba(74,222,128,.3)}
</style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="/"><i class="bi bi-calendar-heart"></i> Kalendár rezervácií</a>
  <a class="back" id="backLink" href="/admin"><i class="bi bi-arrow-left"></i> Späť</a>
</div>

<div class="wrap">
  <div class="daynav">
    <button onclick="moveDay(-1)" title="Predošlý deň"><i class="bi bi-chevron-left"></i></button>
    <div class="daylabel">
      <div class="dl-main" id="dlMain">—</div>
      <div class="dl-sub"><input type="date" id="datePick" onchange="pickDate(this.value)"></div>
    </div>
    <button onclick="moveDay(1)" title="Ďalší deň"><i class="bi bi-chevron-right"></i></button>
  </div>
  <button class="todaybtn" id="todayBtn" onclick="goToday()">↩︎ Dnes</button>

  <div id="dayClasses">
    <div class="empty-day"><span class="spin"><i class="bi bi-arrow-repeat"></i></span><br><br>Načítavam…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS_FULL=['Nedeľa','Pondelok','Utorok','Streda','Štvrtok','Piatok','Sobota'];
const MONTHS=['januára','februára','marca','apríla','mája','júna','júla','augusta','septembra','októbra','novembra','decembra'];
let _sel = new Date(); _sel.setHours(0,0,0,0);
let _schedule = [];
let _addFor = null; // class id currently adding to
// Vložený v trénerskom paneli? Skry vlastnú lištu aj dock — navigáciu dáva panel.
const EMBED = new URLSearchParams(location.search).get('embed')==='1';
if(EMBED){ window.__faDock = true; document.documentElement.style.background='transparent';
  document.addEventListener('DOMContentLoaded',()=>{ const tb=document.querySelector('.topbar'); if(tb) tb.style.display='none'; document.body.style.paddingTop='0'; }); }

async function api(url,opts={}){
  const r=await fetch(url,{headers:{'Content-Type':'application/json'},credentials:'include',...opts,
    body:opts.body?JSON.stringify(opts.body):undefined});
  if(r.status===401){location.href='/';return null;}
  if(r.status===403){location.href='/';return null;}
  try{return await r.json();}catch(e){return null;}
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escJs(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function toast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',2600);}
function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function isToday(d){const t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();}

async function init(){
  const me = await api('/api/me');
  if(!me || (!me.is_admin && me.user_type!=='trainer')){ location.href='/'; return; }
  document.getElementById('backLink').href = me.is_admin ? '/admin' : '/trainer';
  _schedule = await api('/api/attendance/schedule') || [];
  renderDay();
}
function moveDay(delta){ _sel.setDate(_sel.getDate()+delta); renderDay(); }
function pickDate(val){ if(!val) return; const [y,m,d]=val.split('-').map(Number); _sel=new Date(y,m-1,d); _sel.setHours(0,0,0,0); renderDay(); }
function goToday(){ _sel=new Date(); _sel.setHours(0,0,0,0); renderDay(); }

async function renderDay(){
  document.getElementById('dlMain').textContent = DAYS_FULL[_sel.getDay()];
  document.querySelector('.dl-sub input').value = fmtDate(_sel);
  document.getElementById('todayBtn').classList.toggle('hidden', isToday(_sel));
  const dow = _sel.getDay();
  const dateStr = fmtDate(_sel);
  const classes = _schedule.filter(c=>{
    const cat=(c.category||'').toLowerCase(), loc=(c.location||'').toLowerCase();
    if(loc==='online'||cat==='online') return false;  // online is separate
    if(cat!=='zumba') return false;                    // focus: only Zumba
    return c.day_of_week===dow && c.active!==false;
  }).sort((a,b)=>(a.time_start||'').localeCompare(b.time_start||''));
  const host = document.getElementById('dayClasses');
  if(!classes.length){
    host.innerHTML = `<div class="empty-day"><div class="e-emoji">🌙</div>V ${DAYS_FULL[dow].toLowerCase()} nie sú naplánované žiadne Zumba hodiny.</div>`;
    return;
  }
  // Load date-specific attendees + instructor for each class in parallel
  const lists = await Promise.all(classes.map(c=>api(`/api/attendance/class/${c._id}?date=${dateStr}`)));
  const insList = await Promise.all(classes.map(c=>api(`/api/attendance/session-instructor?class_id=${c._id}&date=${dateStr}`)));
  host.innerHTML = classes.map((c,i)=>{
    const att = Array.isArray(lists[i])?lists[i]:[];
    const cap = c.capacity||0;
    const pct = cap? Math.round(att.length/cap*100):0;
    const col = pct>=90?'#f87171':pct>=60?'#fbbf24':'#4ade80';
    const si = insList[i]||{};
    _insBy[c._id]=si;
    const teaches = si.instructor_id && si.viewer_id && si.instructor_id===si.viewer_id;
    const insCtrl = si.viewer_is_admin
      ? `<button onclick="event.stopPropagation();openInsPick('${c._id}','${dateStr}')" style="background:rgba(201,168,76,.14);border:1px solid #C9A84C;color:#C9A84C;border-radius:8px;padding:3px 9px;font-size:.72rem;font-weight:700;cursor:pointer">✏️ zmeniť</button>`
      : (teaches
          ? `<span style="color:#4ade80;font-size:.72rem;font-weight:700">✓ učíš ty</span>`
          : `<button onclick="event.stopPropagation();claimSession('${c._id}','${dateStr}')" style="background:rgba(74,222,128,.14);border:1px solid #4ade80;color:#4ade80;border-radius:8px;padding:3px 9px;font-size:.72rem;font-weight:700;cursor:pointer">✋ učím ja</button>`);
    return `<div class="cls" id="cls-${c._id}" style="animation-delay:${i*40}ms">
      <div class="cls-head" onclick="toggleCls('${c._id}')">
        <div class="cls-emoji">${c.emoji||'💃'}</div>
        <div class="cls-info">
          <div class="cls-name">${esc(c.name)}</div>
          <div class="cls-meta"><span>⏰ ${c.time_start||''}${c.time_end?'–'+c.time_end:''}</span><span>📍 ${esc(c.location||'')}</span></div>
          <div class="cls-meta" style="margin-top:4px"><span>🎓 <b style="color:var(--cream)">${esc(si.instructor||'—')}</b>${si.overridden?' <span style="color:#C9A84C;font-size:.68rem">(zmenené)</span>':''}</span> ${insCtrl}</div>
        </div>
        <div class="cls-count"><div class="num" style="color:${col}">${att.length}${cap?'/'+cap:''}</div><div class="cap">prihlásených</div></div>
        <i class="bi bi-chevron-down cls-chevron"></i>
      </div>
      <div class="cls-body" id="body-${c._id}">${renderAtt(att, c._id, dateStr)}</div>
    </div>`;
  }).join('');
}
const _insBy={};
async function claimSession(classId, dateStr){
  const r=await api('/api/attendance/session-instructor',{method:'POST',body:{class_id:classId, date:dateStr}});
  if(r&&r.ok){ toast('✅ Prihlásený/á ako tréner hodiny'); renderDay(); } else toast(r?.error||'Chyba', true);
}
async function openInsPick(classId, dateStr){
  if(!_trainers){ _trainers=await api('/api/attendance/trainers')||[]; }
  const cur=_insBy[classId]||{};
  let m=document.getElementById('insModal');
  if(!m){ m=document.createElement('div'); m.id='insModal'; m.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;padding:16px'; document.body.appendChild(m); }
  m.onclick=e=>{ if(e.target===m) m.remove(); };
  m.innerHTML=`<div style="background:#161512;border:1px solid rgba(201,168,76,.4);border-radius:16px;max-width:380px;width:100%;padding:18px;color:#EAE3D5">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><b style="color:#C9A84C">🎓 Tréner hodiny</b><button onclick="document.getElementById('insModal').remove()" style="background:none;border:none;color:#999;font-size:1.3rem;cursor:pointer">✕</button></div>
    <div style="font-size:.8rem;color:rgba(234,227,213,.6);margin-bottom:10px">Zmena platí pre tento termín (${esc(dateStr)}), kým ju niekto zase nezmení.</div>
    <div style="display:flex;flex-direction:column;gap:6px;max-height:50vh;overflow-y:auto">
      ${_trainers.map(t=>`<button onclick="setSessionIns('${classId}','${dateStr}','${t.id}')" style="text-align:left;background:${cur.instructor_id===t.id?'rgba(201,168,76,.18)':'rgba(255,255,255,.04)'};border:1px solid ${cur.instructor_id===t.id?'#C9A84C':'var(--border,#333)'};color:#EAE3D5;border-radius:10px;padding:9px 12px;cursor:pointer">${cur.instructor_id===t.id?'✓ ':''}${esc(t.name)}</button>`).join('')}
    </div>
    <button onclick="setSessionIns('${classId}','${dateStr}','')" style="width:100%;margin-top:10px;background:none;border:1px solid #555;color:#999;border-radius:10px;padding:8px;cursor:pointer;font-size:.82rem">↩︎ Vrátiť pôvodného trénera</button>
  </div>`;
}
let _trainers=null;
async function setSessionIns(classId, dateStr, instructorId){
  const r=await api('/api/attendance/session-instructor',{method:'POST',body:{class_id:classId, date:dateStr, instructor_id:instructorId}});
  document.getElementById('insModal')?.remove();
  if(r&&r.ok){ toast('✅ Tréner hodiny nastavený'); renderDay(); } else toast(r?.error||'Chyba', true);
}

function renderAtt(att, classId, dateStr){
  const rows = att.length ? att.map(a=>{
    const badge = a.status==='attended'
      ? '<span class="a-badge" style="background:rgba(74,222,128,.15);color:#4ade80">✓ prišiel</span>'
      : (a.membership
        ? `<span class="a-badge" style="background:rgba(201,168,76,.2);color:#C9A84C">${esc(a.membership)}</span>`
        : (a.single_entries>0?'<span class="a-badge" style="background:rgba(96,165,250,.15);color:#60a5fa">🎟 vstup</span>'
          : (a.free_credits>0?'<span class="a-badge" style="background:rgba(251,191,36,.15);color:#fbbf24">🎁 free</span>'
            :'<span class="a-badge" style="background:rgba(244,67,54,.15);color:#f87171">⚠ bez členstva</span>')));
    const vc=a.visit_count||0;
    const who = a.is_child_booking
      ? `${esc(a.child_name||'dieťa')} <span style="color:#8a8a8a;font-weight:400">(dieťa)</span>`
      : `<a href="/u/${a.user_id}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">${esc(a.name)} <i class="bi bi-box-arrow-up-right" style="font-size:.6rem;opacity:.5"></i></a>`;
    const vcTag = a.is_child_booking ? '' : `<span style="color:#8bc34a;font-size:.72rem;margin-left:6px">👣 ${vc}${vc===0?' 🆕':''}</span>`;
    return `<div class="att-row">
      <span class="a-name">${who}${vcTag}</span>${badge}
      <button class="a-del" onclick="cancelBk('${a.booking_id}','${escJs(a.name)}')">Zrušiť</button>
    </div>`;
  }).join('') : '<div class="att-empty">Zatiaľ nikto — pridaj prvého klienta nižšie 👇</div>';
  const cls = _schedule.find(x=>x._id===classId);
  const defCity = cls?.location || 'all';
  return rows + `
    <div class="add-wrap">
      <div class="add-title" style="display:flex;justify-content:space-between;align-items:center;gap:8px"><span><i class="bi bi-person-plus"></i> Prihlásiť klientku na túto hodinu</span><button onclick="openBcQr('${classId}','${dateStr}')" style="background:rgba(201,168,76,.15);border:1px solid #C9A84C;color:#C9A84C;border-radius:8px;padding:5px 11px;font-size:.8rem;font-weight:700;cursor:pointer;white-space:nowrap"><i class="bi bi-qr-code-scan"></i> Skenovať QR</button></div>
      <div class="picker-controls">
        <select class="pk-city" id="city-${classId}" onchange="loadClientPicker('${classId}','${dateStr}')">
          <option value="all">🌍 Všetky mestá</option>
          <option value="Detva" ${defCity==='Detva'?'selected':''}>📍 Detva</option>
          <option value="Zvolen" ${defCity==='Zvolen'?'selected':''}>📍 Zvolen</option>
          <option value="Banská Bystrica" ${defCity==='Banská Bystrica'?'selected':''}>📍 Banská Bystrica</option>
          <option value="Brezno" ${defCity==='Brezno'?'selected':''}>📍 Brezno</option>
        </select>
        <div class="pk-chips" id="chips-${classId}">
          <button class="pk-chip active" data-f="" onclick="setFilter('${classId}','${dateStr}',this,'')">Všetky</button>
          <button class="pk-chip" data-f="membership" onclick="setFilter('${classId}','${dateStr}',this,'membership')">🏅 Členstvo</button>
          <button class="pk-chip" data-f="pass" onclick="setFilter('${classId}','${dateStr}',this,'pass')">🎟️ Permanentka</button>
          <button class="pk-chip" data-f="none" onclick="setFilter('${classId}','${dateStr}',this,'none')">⚠ Bez</button>
        </div>
      </div>
      <div class="search-box"><i class="bi bi-search"></i>
        <input type="text" placeholder="Hľadať podľa mena…" oninput="onPickerSearch('${classId}','${dateStr}')" id="search-${classId}">
      </div>
      <div id="results-${classId}"><div class="att-empty" style="padding:12px">Načítavam klientky…</div></div>
    </div>`;
}

function toggleCls(id){
  const el=document.getElementById('cls-'+id);
  const opening = !el.classList.contains('open');
  el.classList.toggle('open');
  if(opening){ const cid=id, dateStr=fmtDate(_sel); loadClientPicker(cid, dateStr); }
}

const _pkFilter = {};   // classId -> active status filter
let _pkTimer=null;
function setFilter(classId, dateStr, btn, f){
  _pkFilter[classId]=f;
  document.querySelectorAll(`#chips-${classId} .pk-chip`).forEach(c=>c.classList.toggle('active', c===btn));
  loadClientPicker(classId, dateStr);
}
function onPickerSearch(classId, dateStr){ clearTimeout(_pkTimer); _pkTimer=setTimeout(()=>loadClientPicker(classId,dateStr), 250); }

async function loadClientPicker(classId, dateStr){
  const host = document.getElementById('results-'+classId);
  if(!host) return;
  const city = document.getElementById('city-'+classId)?.value || 'all';
  const filter = _pkFilter[classId] || '';
  const term = document.getElementById('search-'+classId)?.value || '';
  const qs = new URLSearchParams({ city, filter, q:term });
  const res = await api('/api/attendance/clients?'+qs.toString());
  if(!Array.isArray(res) || !res.length){
    host.innerHTML = '<div class="att-empty" style="padding:14px">Nikto nevyhovuje filtru. Skús iné mesto alebo meno.</div>';
    return;
  }
  host.innerHTML = res.map(u=>{
    const hasMem = !!u.membership;
    const hasPass = u.single_entries>0;
    const hasFreeCredit = u.free_credits>0;
    const firstFree = !u.free_class_used;
    let statusBadge, statusColor;
    if(hasMem){ statusBadge='🏅 '+esc(u.membership); statusColor='#C9A84C'; }
    else if(hasPass){ statusBadge='🎟️ '+u.single_entries+' vstup'+(u.single_entries>1?'ov':''); statusColor='#60a5fa'; }
    else if(hasFreeCredit){ statusBadge='🎁 '+u.free_credits+'× zdarma'; statusColor='#fbbf24'; }
    else if(firstFree){ statusBadge='🎁 1. hodina zdarma'; statusColor='#4ade80'; }
    else { statusBadge='⚠ bez členstva'; statusColor='#f87171'; }
    // action buttons per available method
    const btns = [];
    if(hasMem) btns.push(`<button class="pk-book pk-mem" onclick="bookClient('${classId}','${dateStr}','${u.id}','${escJs(u.name)}','membership')">Členstvom</button>`);
    if(hasPass) btns.push(`<button class="pk-book pk-pass" onclick="bookClient('${classId}','${dateStr}','${u.id}','${escJs(u.name)}','single_entry')">🎟️ Vstup</button>`);
    btns.push(`<button class="pk-book pk-free" onclick="bookClient('${classId}','${dateStr}','${u.id}','${escJs(u.name)}','free')">🎁 Zdarma</button>`);
    const vc=u.visit_count||0;
    const newPill = vc===0 ? '<span style="background:rgba(74,222,128,.18);color:#4ade80;border-radius:6px;padding:1px 7px;font-size:.68rem;font-weight:800;margin-left:6px">🆕 PRVÝKRÁT</span>' : '';
    return `<div class="pk-row">
      <div class="pk-info">
        <div class="pk-name"><a href="/u/${u.id}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">${esc(u.name)} <i class="bi bi-box-arrow-up-right" style="font-size:.62rem;opacity:.5"></i></a>${newPill}</div>
        <div class="pk-sub">${u.city?('📍 '+esc(u.city)+' · '):''}<span style="color:#8bc34a">👣 ${vc} ${vc===1?'návšteva':(vc>=2&&vc<=4?'návštevy':'návštev')}</span> · <span style="color:${statusColor}">${statusBadge}</span></div>
      </div>
      <div class="pk-actions">${btns.join('')}</div>
    </div>`;
  }).join('');
}

async function bookClient(classId, dateStr, userId, name, method){
  const d = await api('/api/attendance/manual-booking',{method:'POST',
    body:{user_id:userId, class_id:classId, booking_date:dateStr, method}});
  if(d && d.ok){
    toast('✅ '+name+' prihlásená · '+(d.method_note||''));
    const wasOpen = document.getElementById('cls-'+classId)?.classList.contains('open');
    await refreshClass(classId, dateStr);
    if(wasOpen){ document.getElementById('cls-'+classId)?.classList.add('open'); loadClientPicker(classId, dateStr); }
  } else {
    toast(d?.error||'Chyba pri pridávaní', true);
  }
}

async function refreshClass(classId, dateStr){
  const att = await api(`/api/attendance/class/${classId}?date=${dateStr}`) || [];
  const body = document.getElementById('body-'+classId);
  if(body) body.innerHTML = renderAtt(att, classId, dateStr);
  // update count in header
  const c = _schedule.find(x=>x._id===classId);
  const cap = c?.capacity||0;
  const numEl = document.querySelector('#cls-'+classId+' .cls-count .num');
  if(numEl){ const pct=cap?Math.round(att.length/cap*100):0; const col=pct>=90?'#f87171':pct>=60?'#fbbf24':'#4ade80';
    numEl.textContent = att.length+(cap?'/'+cap:''); numEl.style.color=col; }
}

async function cancelBk(bookingId, name){
  if(!confirm('Zrušiť rezerváciu: '+name+'?')) return;
  const d = await api('/api/attendance/booking/'+bookingId,{method:'DELETE'});
  if(d && d.ok){ toast('Rezervácia zrušená'); const dateStr=fmtDate(_sel);
    // find which class this belonged to — simplest: re-render the whole day
    renderDay();
  } else toast('Chyba pri rušení', true);
}

// ── QR skenovanie do konkrétnej hodiny ────────────────────────────────────────
let _bcQr=null;
function openBcQr(classId, dateStr){
  let m=document.getElementById('bcQrModal');
  if(!m){ m=document.createElement('div'); m.id='bcQrModal';
    m.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;padding:16px';
    document.body.appendChild(m);
  }
  const cls=_schedule.find(x=>x._id===classId);
  m.innerHTML=`<div style="background:#161512;border:1px solid rgba(201,168,76,.4);border-radius:16px;max-width:400px;width:100%;padding:18px;color:#EAE3D5">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><b style="color:#C9A84C">📷 QR check-in — ${esc(cls?.name||'Hodina')}</b><button onclick="closeBcQr()" style="background:none;border:none;color:#999;font-size:1.3rem;cursor:pointer">✕</button></div>
    <div id="bcQrReader" style="width:100%;border-radius:10px;overflow:hidden"></div>
    <div id="bcQrMsg" style="font-size:.85rem;margin-top:10px;text-align:center;color:rgba(234,227,213,.6)">Namier kameru na QR kód klienta…</div>
  </div>`;
  const reader=new Html5Qrcode('bcQrReader'); _bcQr=reader;
  reader.start({facingMode:'environment'}, {fps:10, qrbox:220},
    txt=>onBcScan(txt, classId, dateStr),
    ()=>{}
  ).catch(()=>{ document.getElementById('bcQrMsg').innerHTML='<span style="color:#f87171">Nepodarilo sa spustiť kameru. Povoľ prístup.</span>'; });
}
async function closeBcQr(){
  if(_bcQr){ try{ await _bcQr.stop(); }catch(e){} try{ _bcQr.clear(); }catch(e){} _bcQr=null; }
  document.getElementById('bcQrModal')?.remove();
}
let _bcScanBusy=false;
async function onBcScan(txt, classId, dateStr){
  if(_bcScanBusy) return; _bcScanBusy=true;
  const msg=document.getElementById('bcQrMsg'); if(msg) msg.innerHTML='<span style="color:#C9A84C">⏳ Spracúvam…</span>';
  const r=await api('/api/attendance/qr-checkin',{method:'POST',body:{qr_data:txt, class_id:classId}});
  if(r && r.booking){ if(msg) msg.innerHTML=`<span style="color:#4ade80">✅ ${esc(r.user?.name||'Klient')} zapísaný</span>`; toast('✅ '+(r.user?.name||'Klient')+' zapísaný'); }
  else if(r && r.error==='membership_required'){ if(msg) msg.innerHTML=`<span style="color:#fbbf24">⚠️ ${esc(r.user?.name||'Klient')} nemá členstvo/kredit — zapíš ho zo zoznamu (Zdarma/Vstup).</span>`; }
  else if(r && r.booking?.existing){ if(msg) msg.innerHTML=`<span style="color:#4ade80">✅ Už prihlásený</span>`; }
  else { if(msg) msg.innerHTML=`<span style="color:#f87171">${esc(r?.error||'Chyba')}</span>`; }
  setTimeout(()=>{ _bcScanBusy=false; }, 1500);
  renderDay();
}

init();
</script>
<script src="/dock.js"></script>
