<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Profil – Fusion Academy</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/fa-theme.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--gold:#C9A24C;--cream:#EAE3D5;--muted:#8a8272;--bg:#141210;--card:#1b1916;--border:#2e2a20}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Manrope',system-ui,sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;padding:24px 16px 60px}
  .wrap{max-width:720px;margin:0 auto}
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:.85rem;margin-bottom:16px}
  .back:hover{color:var(--gold)}
  .hero{background:linear-gradient(150deg,#211d16,#15130f);border:1px solid var(--border);border-radius:20px;padding:30px 26px;text-align:center;position:relative;overflow:hidden}
  .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% -10%,rgba(201,162,76,.18),transparent 60%);pointer-events:none}
  /* Unlockable backgrounds (by achievement count) */
  .hero.bg-bronze{background:linear-gradient(150deg,#2a2016,#171009);border-color:rgba(205,127,50,.4)}
  .hero.bg-bronze::before{background:radial-gradient(circle at 50% -10%,rgba(205,127,50,.28),transparent 62%)}
  .hero.bg-silver{background:linear-gradient(150deg,#232630,#12141a);border-color:rgba(192,198,208,.4)}
  .hero.bg-silver::before{background:radial-gradient(circle at 30% -10%,rgba(192,198,208,.25),transparent 60%),radial-gradient(circle at 80% 10%,rgba(120,140,180,.18),transparent 55%)}
  .hero.bg-gold{background:linear-gradient(150deg,#2e2611,#1a1408);border-color:rgba(201,162,76,.55)}
  .hero.bg-gold::before{background:radial-gradient(circle at 50% -15%,rgba(247,231,184,.30),transparent 60%),radial-gradient(circle at 15% 90%,rgba(201,162,76,.22),transparent 55%)}
  .hero.bg-legend{background:linear-gradient(150deg,#2a1830,#0f0a14);border-color:rgba(180,120,220,.5);box-shadow:0 0 40px -12px rgba(180,120,220,.5)}
  .hero.bg-legend::before{background:radial-gradient(circle at 20% -10%,rgba(233,69,96,.22),transparent 55%),radial-gradient(circle at 80% 0%,rgba(120,140,255,.22),transparent 55%),radial-gradient(circle at 50% 110%,rgba(201,162,76,.25),transparent 55%);animation:auroraShift 8s ease-in-out infinite alternate}
  @keyframes auroraShift{from{opacity:.7;transform:scale(1)}to{opacity:1;transform:scale(1.15)}}
  /* Membership-level glow — everyone sees the client's tier shine */
  .hero.mem-bronze{box-shadow:0 0 34px -8px rgba(205,127,50,.65);border-color:rgba(205,127,50,.7)}
  .hero.mem-silver{box-shadow:0 0 38px -8px rgba(196,201,214,.7);border-color:rgba(196,201,214,.8)}
  .hero.mem-gold{box-shadow:0 0 46px -6px rgba(201,168,76,.85);border-color:rgba(247,231,184,.9);animation:memGoldPulse 3.2s ease-in-out infinite}
  @keyframes memGoldPulse{0%,100%{box-shadow:0 0 40px -8px rgba(201,168,76,.7)}50%{box-shadow:0 0 58px -4px rgba(247,231,184,.95)}}
  .mem-badge{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:.74rem;letter-spacing:.04em;text-transform:uppercase;padding:4px 14px;border-radius:20px;margin-bottom:8px}
  .mem-badge.mem-bronze{background:linear-gradient(102deg,#8a5320,#cd7f32 50%,#e0a86a);color:#231607;box-shadow:0 4px 14px -6px rgba(205,127,50,.8)}
  .mem-badge.mem-silver{background:linear-gradient(102deg,#8f939c,#e8ecf4 50%,#b9bfcb);color:#1a1c22;box-shadow:0 4px 14px -6px rgba(196,201,214,.8)}
  .mem-badge.mem-gold{background:linear-gradient(102deg,#B98F3E,#F7E7B8 45%,#E7C878 65%,#B98F3E);color:#231A08;box-shadow:0 4px 16px -5px rgba(201,168,76,.9)}
  @media(prefers-reduced-motion:reduce){.hero.mem-gold{animation:none}}
  .bg-hint{text-align:center;color:var(--muted);font-size:.78rem;margin-top:10px}
  .msg-btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:10px;background:#241f17;border:1px solid var(--border);color:var(--cream);border-radius:12px;padding:12px;font-weight:700;font-size:.9rem;text-decoration:none;font-family:'Manrope'}
  .msg-btn:hover{border-color:var(--gold);color:var(--gold)}
  .avatar{width:104px;height:104px;border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:600;color:#1a1710;background:linear-gradient(135deg,var(--gold),#a07830);overflow:hidden;border:3px solid rgba(201,162,76,.4);box-shadow:0 0 30px -6px rgba(201,162,76,.5)}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .name-badge{display:inline-block;background:linear-gradient(102deg,#B98F3E,#F7E7B8 40%,#E7C878 60%,#B98F3E);color:#231A08;font-weight:800;font-size:.72rem;letter-spacing:.03em;text-transform:uppercase;padding:3px 12px;border-radius:20px;margin-bottom:8px;box-shadow:0 4px 14px -6px rgba(201,162,76,.7)}
  .pname{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;line-height:1.1}
  .pnick{color:var(--gold);font-size:.92rem;font-weight:700;margin-top:3px}
  .nick-edit{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;text-decoration:underline;margin-top:4px}
  .nick-edit:hover{color:var(--gold)}
  .gender-switch{display:inline-flex;gap:0;margin-top:10px;border:1px solid var(--border);border-radius:20px;overflow:hidden}
  .gseg{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;font-weight:700;padding:6px 14px;font-family:'Manrope';transition:.15s}
  .gseg.on{background:linear-gradient(102deg,#B98F3E,#F7E7B8 45%,#E7C878 65%,#B98F3E);color:#231A08}
  .pname.glow{text-shadow:0 0 18px rgba(201,162,76,.65),0 0 4px rgba(201,162,76,.9)}
  .ptags{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px}
  .joined-date{margin-top:10px;font-size:.78rem;color:var(--muted)}
  .tag{background:rgba(201,162,76,.12);border:1px solid rgba(201,162,76,.3);color:var(--gold);padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 10px;text-align:center}
  .stat .n{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:600;color:var(--gold)}
  .stat .l{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
  .fbtn{width:100%;margin-top:6px;border:none;border-radius:12px;padding:13px;font-weight:800;font-size:.92rem;cursor:pointer;font-family:'Manrope'}
  .fbtn.add{background:linear-gradient(102deg,#B98F3E,#F7E7B8 36%,#E7C878 58%,#B98F3E);color:#231A08}
  .fbtn.sec{background:#241f17;border:1px solid var(--border);color:var(--cream)}
  .fbtn.ok{background:#1e2a1e;border:1px solid #35502f;color:#9fd894}
  .sec-title{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:800;margin:26px 0 12px}
  .ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:12px}
  .ach{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 8px;text-align:center;position:relative;transition:.2s}
  .ach.earned{border-color:rgba(201,162,76,.5);background:linear-gradient(160deg,#221d14,#191612)}
  .ach.earned .ico{filter:none}
  .ach .ico{font-size:1.9rem;filter:grayscale(1) opacity(.32)}
  .ach.earned .ico{text-shadow:0 0 14px rgba(201,162,76,.6)}
  .ach .an{font-size:.72rem;font-weight:700;margin-top:6px;color:var(--cream)}
  .ach:not(.earned) .an{color:var(--muted)}
  .ach .ad{font-size:.64rem;color:var(--muted);margin-top:2px;line-height:1.2}
  .ach .lock{position:absolute;top:6px;right:8px;font-size:.7rem;color:var(--muted)}
  .prog{height:4px;background:#0f0d0b;border-radius:3px;margin-top:7px;overflow:hidden}
  .prog>i{display:block;height:100%;background:var(--gold)}
  .empty{color:var(--muted);text-align:center;padding:20px;font-size:.9rem}
  .anon-note{background:#221d14;border:1px solid var(--border);border-radius:12px;padding:14px;color:var(--muted);font-size:.85rem;text-align:center;margin-top:16px}
  .like-btn{display:inline-flex;align-items:center;gap:8px;margin-top:14px;background:#241f17;border:1px solid var(--border);color:var(--cream);border-radius:24px;padding:9px 20px;font-weight:700;font-size:.92rem;cursor:pointer;font-family:'Manrope';transition:.15s}
  .like-btn:hover{border-color:#e0577b;color:#f2889f}
  .like-btn.liked{background:linear-gradient(102deg,#7a2438,#b0324f);border-color:#e0577b;color:#ffd7e0}
  .like-btn .bi{font-size:1.05rem}
  .like-btn.pop{animation:likePop .35s ease}
  @keyframes likePop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
  .cmt-form{display:flex;gap:8px;margin-bottom:16px}
  .cmt-form textarea{flex:1;background:var(--card);border:1px solid var(--border);color:var(--cream);border-radius:12px;padding:11px 13px;font-family:'Manrope';font-size:.9rem;resize:vertical;min-height:44px}
  .cmt-form textarea:focus{outline:none;border-color:var(--gold)}
  .cmt-form button{align-self:flex-end;background:linear-gradient(102deg,#B98F3E,#F7E7B8 40%,#E7C878 60%,#B98F3E);color:#231A08;border:none;border-radius:12px;padding:11px 18px;font-weight:800;cursor:pointer;font-family:'Manrope'}
  .cmt{display:flex;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin-bottom:10px;position:relative}
  .cmt-av{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;color:#1a1710;background:linear-gradient(135deg,var(--gold),#a07830);overflow:hidden;font-size:.9rem}
  .cmt-av img{width:100%;height:100%;object-fit:cover}
  .cmt-body{flex:1;min-width:0}
  .cmt-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .cmt-name{font-weight:700;font-size:.86rem;color:var(--cream)}
  .cmt-name a{color:var(--cream);text-decoration:none}
  .cmt-name a:hover{color:var(--gold)}
  .cmt-time{font-size:.7rem;color:var(--muted)}
  .cmt-text{font-size:.9rem;color:#d8d2c4;margin-top:3px;word-wrap:break-word;white-space:pre-wrap}
  .cmt-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;padding:0 2px}
  .cmt-del:hover{color:#e0577b}
</style>
</head>
<body>
<div class="wrap">
  <a href="/community" class="back"><i class="bi bi-arrow-left"></i> Späť do komunity</a>
  <div id="host"><div class="empty">Načítavam profil…</div></div>
</div>
<script>
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const uid=location.pathname.split('/').pop();
let P=null;
async function load(){
  const r=await fetch('/api/profile/'+encodeURIComponent(uid),{credentials:'include'});
  if(r.status===401){ location.href='/?next='+encodeURIComponent(location.pathname); return; }
  if(!r.ok){ document.getElementById('host').innerHTML='<div class="empty">Profil sa nepodarilo načítať.</div>'; return; }
  P=await r.json(); render();
}
function friendBtn(){
  if(P.friend_state==='self') return '';
  if(P.anonymous) return '';
  if(P.friend_state==='friends') return `<button class="fbtn ok" onclick="rmFriend()"><i class="bi bi-check-circle-fill"></i> Priatelia · odobrať</button>`;
  if(P.friend_state==='requested') return `<button class="fbtn sec" onclick="rmFriend()"><i class="bi bi-hourglass-split"></i> Žiadosť odoslaná · zrušiť</button>`;
  if(P.friend_state==='incoming') return `<button class="fbtn add" onclick="accept()"><i class="bi bi-person-check-fill"></i> Prijať žiadosť</button>`;
  return `<button class="fbtn add" onclick="addFriend()"><i class="bi bi-person-plus-fill"></i> Pridať do priateľov</button>`;
}
function render(){
  const isM=P.gender==='male';
  const memberWord=isM?'člen':'členka';
  const initials=(P.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const av=P.avatar?`<img src="${P.avatar}" alt="">`:esc(initials);
  const flex=P.earned_count>=5?'glow':'';
  const cats={visits:'Návštevy',refs:'Privedení členovia',tenure:'Vernosť'};
  const earned=P.achievements.filter(a=>a.earned), locked=P.achievements.filter(a=>!a.earned);
  const achCard=a=>`<div class="ach ${a.earned?'earned':''}">
     ${a.earned?'':'<span class="lock"><i class="bi bi-lock-fill"></i></span>'}
     <div class="ico">${a.icon}</div><div class="an">${esc(a.name)}</div><div class="ad">${esc(a.desc)}</div>
     ${a.earned?'':`<div class="prog"><i style="width:${a.progress}%"></i></div>`}
   </div>`;
  const bgNames={bronze:'Bronzové',silver:'Strieborné',gold:'Zlaté',legend:'Legendárne'};
  document.getElementById('host').innerHTML=`
    <div class="hero bg-${esc(P.bg_tier||'basic')} ${P.membership_tier?'mem-'+esc(P.membership_tier):''}">
      <div class="avatar">${av}</div>
      ${P.membership_tier?`<div class="mem-badge mem-${esc(P.membership_tier)}">${P.membership_tier==='gold'?'👑':P.membership_tier==='silver'?'⭐':'🥉'} ${esc(P.membership_name||P.membership_tier)} ${memberWord}</div>`:''}
      ${P.name_badge?`<div class="name-badge">${P.name_badge.emoji} ${esc(P.name_badge.title)}</div>`:''}
      <div class="pname ${flex}">${P.name_badge?P.name_badge.emoji+' ':''}${esc(P.name)}</div>
      ${P.nickname?`<div class="pnick">„${esc(P.nickname)}"</div>`:''}
      ${P.is_self?`<button class="nick-edit" onclick="editNick()"><i class="bi bi-pencil"></i> ${P.nickname?'Zmeniť prezývku':'Pridať prezývku'}</button>`:''}
      ${P.is_self?`<div class="gender-switch">
        <button class="gseg ${!isM?'on':''}" onclick="setGender('female')">♀ Žena</button>
        <button class="gseg ${isM?'on':''}" onclick="setGender('male')">♂ Muž</button>
      </div>`:''}
      <div class="ptags">
        <span class="tag">${P.member_badge?.emoji||'🌱'} ${esc(P.member_badge?.label||'Nováčik')}</span>
        <span class="tag">🏅 ${esc(P.loyalty_label)}</span>
        <span class="tag">🏆 ${P.earned_count}/${P.total_count} odznakov</span>
      </div>
      ${P.joined?`<div class="joined-date">💛 ${isM?'Členom':'Členkou'} od ${new Date(P.joined).toLocaleDateString('sk-SK',{month:'long',year:'numeric'})}</div>`:''}
      <div>${P.is_self
        ? `<button class="like-btn" disabled style="opacity:.75;cursor:default"><i class="bi bi-heart-fill"></i> ${P.likes||0} lajkov</button>`
        : `<button id="likeBtn" class="like-btn ${P.liked_by_me?'liked':''}" onclick="toggleLike()"><i class="bi ${P.liked_by_me?'bi-heart-fill':'bi-heart'}"></i> <span id="likeCount">${P.likes||0}</span></button>`}</div>
    </div>
    ${P.is_self && P.next_bg ? `<div class="bg-hint">🎨 Odomkni <b style="color:var(--gold)">${bgNames[P.next_bg.tier]||''} pozadie</b> pri ${P.next_bg.need} odznakoch (máš ${P.earned_count})</div>` : ''}
    ${P.anonymous && !P.is_self ? '<div class="anon-note">🔒 Tento člen má profil nastavený ako anonymný.</div>' : `
    <div class="stats">
      <div class="stat"><div class="n">${P.visits}</div><div class="l">Návštev</div></div>
      <div class="stat"><div class="n">${P.referrals}</div><div class="l">V štruktúre</div></div>
      <div class="stat"><div class="n">${P.months_member}</div><div class="l">Mesiacov</div></div>
    </div>
    ${friendBtn()}
    ${(!P.is_self && !P.anonymous) ? `<a class="msg-btn" href="/community?dm=${P.id}"><i class="bi bi-chat-dots-fill"></i> Napísať správu</a>` : ''}
    <div class="sec-title">🏆 Získané odznaky (${earned.length})</div>
    <div class="ach-grid">${earned.length?earned.map(achCard).join(''):'<div class="empty">Zatiaľ žiadne — poď na hodinu! 💃</div>'}</div>
    ${locked.length?`<div class="sec-title">🔒 Ešte odomknúť</div><div class="ach-grid">${locked.map(achCard).join('')}</div>`:''}
    `}
    <div class="sec-title">💬 Odkazy na profile</div>
    ${P.anonymous && !P.is_self ? '' : `<div class="cmt-form">
      <textarea id="cmtText" maxlength="500" placeholder="${P.is_self?'Napíš niečo na svoj profil…':'Zanechaj milý odkaz…'}"></textarea>
      <button onclick="sendComment()">Pridať</button>
    </div>`}
    <div id="cmtList"><div class="empty">Načítavam odkazy…</div></div>
  `;
  loadComments();
}
async function loadComments(){
  const box=document.getElementById('cmtList'); if(!box) return;
  try{
    const r=await fetch('/api/profile/'+encodeURIComponent(uid)+'/comments',{credentials:'include'});
    const d=await r.json();
    if(!d.comments||!d.comments.length){ box.innerHTML='<div class="empty">Zatiaľ žiadne odkazy. Buď prvá! 💛</div>'; return; }
    box.innerHTML=d.comments.map(c=>{
      const ini=(c.author_name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
      const av=c.author_avatar?`<img src="${c.author_avatar}" alt="">`:esc(ini);
      const t=new Date(c.created_at).toLocaleDateString('sk-SK',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      return `<div class="cmt">
        <div class="cmt-av">${av}</div>
        <div class="cmt-body">
          <div class="cmt-head">
            <span class="cmt-name"><a href="/u/${c.author_id}">${esc(c.author_name)}</a></span>
            <span class="cmt-time">${t}${c.can_delete?` · <button class="cmt-del" onclick="delComment('${c.id}')" title="Zmazať"><i class="bi bi-trash"></i></button>`:''}</span>
          </div>
          <div class="cmt-text">${esc(c.text)}</div>
        </div>
      </div>`;
    }).join('');
  }catch(e){ box.innerHTML='<div class="empty">Odkazy sa nepodarilo načítať.</div>'; }
}
async function toggleLike(){
  const btn=document.getElementById('likeBtn');
  const d=await post('/api/profile/'+encodeURIComponent(uid)+'/like',{});
  if(d.error) return;
  P.liked_by_me=d.liked; P.likes=d.likes;
  document.getElementById('likeCount').textContent=d.likes;
  btn.classList.toggle('liked',d.liked);
  btn.querySelector('.bi').className='bi '+(d.liked?'bi-heart-fill':'bi-heart');
  btn.classList.remove('pop'); void btn.offsetWidth; btn.classList.add('pop');
}
async function sendComment(){
  const ta=document.getElementById('cmtText'); const text=(ta.value||'').trim();
  if(!text) return;
  const d=await post('/api/profile/'+encodeURIComponent(uid)+'/comments',{text});
  if(d.error){ alert(d.error); return; }
  ta.value=''; loadComments();
}
async function delComment(cid){
  if(!confirm('Zmazať tento odkaz?')) return;
  const r=await fetch('/api/profile/'+encodeURIComponent(uid)+'/comments/'+cid,{method:'DELETE',credentials:'include'});
  if(r.ok) loadComments();
}
async function post(url,body){ const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify(body)}); return r.json(); }
async function editNick(){
  const cur=P.nickname||'';
  const val=prompt('Tvoja prezývka (zobrazí sa pod menom aj v komunitnom chate, max 30 znakov):',cur);
  if(val===null) return;
  const nickname=val.trim().slice(0,30);
  const r=await fetch('/api/profile',{method:'PUT',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({nickname})});
  if(r.ok){ P.nickname=nickname; render(); }
}
async function setGender(g){
  if(P.gender===g) return;
  const r=await fetch('/api/profile',{method:'PUT',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({gender:g})});
  if(r.ok){ location.reload(); } // reload so achievements re-render with correct declension
}
async function addFriend(){ const d=await post('/api/friends/request',{to:uid}); if(d.ok){P.friend_state=d.state;render();} }
async function accept(){ const d=await post('/api/friends/accept',{from:uid}); if(d.ok){P.friend_state=d.state;render();} }
async function rmFriend(){ const d=await post('/api/friends/remove',{user:uid}); if(d.ok){P.friend_state='none';render();} }
load();
</script>
</body>
</html>
