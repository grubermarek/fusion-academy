<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Profil – Fusion Academy</title>
<link rel="icon" type="image/png" href="/logo-mark.png">
<link rel="stylesheet" href="/fa-theme.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="/i18n.js"></script>
<style>
  :root{--gold:#C9A24C;--cream:#EAE3D5;--muted:#8a8272;--bg:#141210;--card:#1b1916;--border:#2e2a20}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Manrope',system-ui,sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;padding:24px 16px 60px}
  .wrap{max-width:720px;margin:0 auto}
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:.85rem;margin-bottom:16px}
  .back:hover{color:var(--gold)}
  .hero{background:linear-gradient(150deg,#211d16,#15130f);border:1px solid var(--border);border-radius:20px;padding:30px 26px;text-align:center;position:relative;overflow:hidden}
  .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% -10%,rgba(201,162,76,.18),transparent 60%);pointer-events:none}
  @keyframes auroraShift{from{opacity:.7;transform:scale(1)}to{opacity:1;transform:scale(1.15)}}
  /* ─── Pozadie CELÉHO profilu = odmena za privedených ľudí (1 → 10000) ─── */
  body[class*="pbg-"]{transition:background .6s ease}
  body.pbg-spark{background:radial-gradient(circle at 50% -5%,#241f14,#141210 55%)}
  body.pbg-dawn{background:linear-gradient(180deg,#241a12,#141210 60%)}
  body.pbg-dawn::after,body.pbg-bloom::after,body.pbg-sunset::after,body.pbg-ocean::after,body.pbg-emerald::after,body.pbg-royal::after,body.pbg-nebula::after,body.pbg-aurora::after,body.pbg-galaxy::after,body.pbg-cosmos::after,body.pbg-nova::after,body.pbg-infinity::after{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none}
  body.pbg-dawn::after{background:radial-gradient(circle at 15% 0%,rgba(255,150,80,.10),transparent 45%)}
  body.pbg-bloom{background:linear-gradient(180deg,#231525,#141210 60%)}
  body.pbg-bloom::after{background:radial-gradient(circle at 85% 5%,rgba(233,120,180,.12),transparent 45%),radial-gradient(circle at 10% 30%,rgba(120,200,150,.08),transparent 40%)}
  body.pbg-sunset{background:linear-gradient(180deg,#2a1810,#141210 55%)}
  body.pbg-sunset::after{background:radial-gradient(circle at 50% -5%,rgba(255,120,60,.18),transparent 50%),radial-gradient(circle at 80% 20%,rgba(233,69,96,.12),transparent 45%)}
  body.pbg-ocean{background:linear-gradient(180deg,#0f1c2a,#0d1114 60%)}
  body.pbg-ocean::after{background:radial-gradient(circle at 20% 0%,rgba(60,160,220,.18),transparent 50%),radial-gradient(circle at 90% 40%,rgba(80,200,200,.12),transparent 45%)}
  body.pbg-emerald{background:linear-gradient(180deg,#0f241a,#0d1310 60%)}
  body.pbg-emerald::after{background:radial-gradient(circle at 30% 0%,rgba(46,204,113,.20),transparent 50%),radial-gradient(circle at 85% 30%,rgba(201,168,76,.12),transparent 45%)}
  body.pbg-royal{background:linear-gradient(180deg,#1c1230,#100c18 60%)}
  body.pbg-royal::after{background:radial-gradient(circle at 25% 0%,rgba(150,90,230,.22),transparent 50%),radial-gradient(circle at 80% 25%,rgba(247,231,184,.14),transparent 45%)}
  body.pbg-nebula{background:linear-gradient(160deg,#241035,#0e0a16 60%)}
  body.pbg-nebula::after{background:radial-gradient(circle at 15% 5%,rgba(233,69,140,.20),transparent 45%),radial-gradient(circle at 85% 15%,rgba(90,120,255,.18),transparent 45%),radial-gradient(circle at 50% 90%,rgba(201,168,76,.12),transparent 45%);animation:auroraShift 10s ease-in-out infinite alternate}
  body.pbg-aurora{background:linear-gradient(160deg,#0c2028,#0a0e14 60%)}
  body.pbg-aurora::after{background:radial-gradient(circle at 20% 0%,rgba(46,204,150,.22),transparent 45%),radial-gradient(circle at 75% 10%,rgba(90,140,255,.20),transparent 45%),radial-gradient(circle at 50% 100%,rgba(180,120,220,.16),transparent 50%);animation:auroraShift 8s ease-in-out infinite alternate}
  body.pbg-galaxy{background:radial-gradient(circle at 50% 30%,#1a1440,#0a0812 65%)}
  body.pbg-galaxy::after{background:radial-gradient(circle at 15% 10%,rgba(120,90,255,.25),transparent 45%),radial-gradient(circle at 85% 20%,rgba(233,69,140,.20),transparent 45%),radial-gradient(circle at 50% 95%,rgba(90,200,255,.16),transparent 50%);animation:auroraShift 9s ease-in-out infinite alternate}
  body.pbg-cosmos{background:radial-gradient(circle at 50% 20%,#221046,#08060f 65%)}
  body.pbg-cosmos::after{background:radial-gradient(circle at 10% 5%,rgba(255,120,200,.26),transparent 42%),radial-gradient(circle at 90% 10%,rgba(120,100,255,.24),transparent 42%),radial-gradient(circle at 30% 95%,rgba(80,220,220,.18),transparent 48%),radial-gradient(circle at 70% 85%,rgba(247,231,184,.14),transparent 45%);animation:auroraShift 8s ease-in-out infinite alternate}
  body.pbg-nova{background:radial-gradient(circle at 50% 15%,#3a0f30,#08060f 62%)}
  body.pbg-nova::after{background:radial-gradient(circle at 50% 8%,rgba(255,180,80,.30),transparent 40%),radial-gradient(circle at 12% 25%,rgba(233,69,96,.26),transparent 45%),radial-gradient(circle at 88% 30%,rgba(150,90,255,.24),transparent 45%),radial-gradient(circle at 50% 100%,rgba(90,200,255,.18),transparent 50%);animation:auroraShift 6s ease-in-out infinite alternate}
  body.pbg-infinity{background:radial-gradient(circle at 50% 20%,#2a0a4a,#050409 62%)}
  body.pbg-infinity::after{background:radial-gradient(circle at 50% 5%,rgba(247,231,184,.30),transparent 38%),radial-gradient(circle at 8% 15%,rgba(120,90,255,.28),transparent 42%),radial-gradient(circle at 92% 20%,rgba(233,69,140,.28),transparent 42%),radial-gradient(circle at 25% 95%,rgba(46,204,180,.22),transparent 46%),radial-gradient(circle at 78% 90%,rgba(255,140,60,.20),transparent 44%);animation:auroraShift 5s ease-in-out infinite alternate}
  /* ─── ZAKLADATEĽ — úplne unikátny vzhľad ─── */
  body.pbg-founder{background:radial-gradient(circle at 50% 0%,#2a2008,#0d0b06 55%)}
  body.pbg-founder::after{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:
      radial-gradient(circle at 50% -5%,rgba(247,231,184,.35),transparent 42%),
      radial-gradient(circle at 12% 20%,rgba(201,162,76,.28),transparent 40%),
      radial-gradient(circle at 88% 24%,rgba(201,162,76,.24),transparent 40%),
      radial-gradient(circle at 30% 95%,rgba(180,120,60,.20),transparent 46%),
      radial-gradient(circle at 75% 90%,rgba(247,231,184,.16),transparent 44%);
    animation:founderShine 7s ease-in-out infinite alternate}
  @keyframes founderShine{from{opacity:.8;transform:scale(1)}to{opacity:1;transform:scale(1.1)}}
  .hero.founder{background:linear-gradient(150deg,#2a2109,#171206)!important;border:1px solid rgba(247,231,184,.7)!important;
    box-shadow:0 0 60px -10px rgba(247,231,184,.6),inset 0 0 40px -20px rgba(247,231,184,.4)!important;
    animation:founderCard 4s ease-in-out infinite!important}
  @keyframes founderCard{0%,100%{box-shadow:0 0 55px -12px rgba(201,162,76,.55),inset 0 0 40px -22px rgba(247,231,184,.35)}50%{box-shadow:0 0 75px -6px rgba(247,231,184,.8),inset 0 0 46px -16px rgba(247,231,184,.5)}}
  .hero.founder .avatar{border:3px solid rgba(247,231,184,.85);box-shadow:0 0 34px -4px rgba(247,231,184,.8)}
  .hero.founder .pname{background:linear-gradient(92deg,#F7E7B8,#E7C878,#F7E7B8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none}
  .founder-crown{display:inline-block;background:linear-gradient(102deg,#8a6a1e,#F7E7B8 45%,#E7C878 65%,#8a6a1e);color:#1a1305;font-weight:900;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;padding:4px 16px;border-radius:20px;margin-bottom:8px;box-shadow:0 4px 18px -4px rgba(247,231,184,.9)}
  .admin-tag{background:linear-gradient(102deg,#3a3f52,#8b93a8 50%,#5a627a);color:#fff;border:none!important;font-weight:800}
  @media(prefers-reduced-motion:reduce){body.pbg-founder::after,.hero.founder{animation:none!important}}
  .report-btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:10px;background:#1c1a2a;border:1px solid #3a3f66;color:#c9cff0;border-radius:12px;padding:11px;font-weight:700;font-size:.88rem;cursor:pointer;font-family:'Manrope'}
  .report-btn:hover{border-color:#7a83c0;color:#fff}
  /* Membership-level glow + karta profilu — everyone sees the client's tier shine */
  .hero.mem-bronze{background:linear-gradient(150deg,#2a2016,#171009);box-shadow:0 0 34px -8px rgba(205,127,50,.65);border-color:rgba(205,127,50,.7)}
  .hero.mem-silver{background:linear-gradient(150deg,#232630,#12141a);box-shadow:0 0 38px -8px rgba(196,201,214,.7);border-color:rgba(196,201,214,.8)}
  .hero.mem-gold{background:linear-gradient(150deg,#2e2611,#1a1408);box-shadow:0 0 46px -6px rgba(201,168,76,.85);border-color:rgba(247,231,184,.9);animation:memGoldPulse 3.2s ease-in-out infinite}
  @keyframes memGoldPulse{0%,100%{box-shadow:0 0 40px -8px rgba(201,168,76,.7)}50%{box-shadow:0 0 58px -4px rgba(247,231,184,.95)}}
  .mem-badge{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:.74rem;letter-spacing:.04em;text-transform:uppercase;padding:4px 14px;border-radius:20px;margin-bottom:8px}
  .mem-badge.mem-bronze{background:linear-gradient(102deg,#8a5320,#cd7f32 50%,#e0a86a);color:#231607;box-shadow:0 4px 14px -6px rgba(205,127,50,.8)}
  .mem-badge.mem-silver{background:linear-gradient(102deg,#8f939c,#e8ecf4 50%,#b9bfcb);color:#1a1c22;box-shadow:0 4px 14px -6px rgba(196,201,214,.8)}
  .mem-badge.mem-gold{background:linear-gradient(102deg,#B98F3E,#F7E7B8 45%,#E7C878 65%,#B98F3E);color:#231A08;box-shadow:0 4px 16px -5px rgba(201,168,76,.9)}
  @media(prefers-reduced-motion:reduce){.hero.mem-gold{animation:none}}
  .bg-hint{text-align:center;color:var(--muted);font-size:.78rem;margin-top:10px}
  .bgg{margin-top:16px;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .bgg summary{list-style:none;cursor:pointer;padding:13px 16px;font-weight:700;color:var(--gold);display:flex;justify-content:space-between;align-items:center}
  .bgg summary::-webkit-details-marker{display:none}
  .bgg[open] summary .chev{transform:rotate(180deg)}
  .bgg .chev{transition:.2s;color:var(--muted)}
  .bgg-body{padding:6px 14px 16px}
  .bgg-hint{font-size:.76rem;color:var(--muted);line-height:1.45;margin-bottom:12px}
  .bgg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px}
  .bgsw{border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;position:relative;transition:.15s}
  .bgsw:hover{transform:translateY(-2px);border-color:var(--gold)}
  .bgsw.cur{border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,162,76,.5)}
  .bgsw .prev{height:56px;position:relative}
  .bgsw.locked .prev{filter:grayscale(.7) brightness(.55)}
  .bgsw .lock{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:#fff;text-shadow:0 1px 4px #000}
  .bgsw .meta{padding:6px 7px;background:#141210}
  .bgsw .nm{font-size:.72rem;font-weight:700;color:var(--cream);line-height:1.1}
  .bgsw .nd{font-size:.64rem;color:var(--muted);margin-top:1px}
  .bgsw.unlocked .nd{color:#81c784}
  .bgg-preview-bar{display:none;position:fixed;left:50%;bottom:96px;transform:translateX(-50%);z-index:700;background:#161512;border:1px solid var(--gold);border-radius:24px;padding:8px 8px 8px 16px;align-items:center;gap:10px;box-shadow:0 12px 34px rgba(0,0,0,.6);font-size:.82rem}
  .bgg-preview-bar.on{display:flex}
  .bgg-preview-bar button{background:#241f17;border:1px solid var(--border);color:var(--cream);border-radius:16px;padding:6px 12px;cursor:pointer;font-family:'Manrope';font-size:.8rem}
  .msg-btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:10px;background:#241f17;border:1px solid var(--border);color:var(--cream);border-radius:12px;padding:12px;font-weight:700;font-size:.9rem;text-decoration:none;font-family:'Manrope'}
  .msg-btn:hover{border-color:var(--gold);color:var(--gold)}
  .avatar{width:104px;height:104px;border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:600;color:#1a1710;background:linear-gradient(135deg,var(--gold),#a07830);overflow:hidden;border:3px solid rgba(201,162,76,.4);box-shadow:0 0 30px -6px rgba(201,162,76,.5)}
  .avatar{position:relative}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .av-cam{position:absolute;bottom:2px;right:2px;width:30px;height:30px;border-radius:50%;background:var(--gold);color:#1a1710;display:flex;align-items:center;justify-content:center;font-size:.85rem;border:2px solid var(--bg)}
  .name-badge{display:inline-block;background:linear-gradient(102deg,#B98F3E,#F7E7B8 40%,#E7C878 60%,#B98F3E);color:#231A08;font-weight:800;font-size:.72rem;letter-spacing:.03em;text-transform:uppercase;padding:3px 12px;border-radius:20px;margin-bottom:8px;box-shadow:0 4px 14px -6px rgba(201,162,76,.7)}
  .pname{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;line-height:1.1}
  .pnick{color:var(--gold);font-size:.92rem;font-weight:700;margin-top:3px}
  .pstatus{color:var(--cream);font-size:.9rem;font-style:italic;opacity:.85;margin-top:8px;max-width:420px;margin-left:auto;margin-right:auto;line-height:1.4}
  .set-hint{font-size:.74rem;color:var(--muted);line-height:1.4}
  .pts-box{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-top:14px;overflow:hidden}
  .pts-box summary{list-style:none;cursor:pointer;padding:13px 16px;font-weight:700;display:flex;justify-content:space-between;align-items:center;color:var(--cream)}
  .pts-box summary::-webkit-details-marker{display:none}
  .pts-box[open] summary i{transform:rotate(180deg)}
  .pts-box summary i{transition:.2s;color:var(--muted)}
  .pts-body{padding:2px 16px 14px}
  .pts-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid var(--border);font-size:.88rem}
  .pts-row b{color:var(--gold);white-space:nowrap}
  .pts-sub{color:var(--muted);font-size:.76rem}
  .pts-total{border-bottom:none;padding-top:12px;font-size:1rem}
  .pts-total b{color:var(--cream)}
  .set-status textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--cream);border-radius:10px;padding:10px 12px;font-family:'Manrope';font-size:.9rem;resize:vertical;min-height:44px}
  .set-status textarea:focus{outline:none;border-color:var(--gold)}
  .set-inline{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .set-inline input[type=date]{background:var(--bg);border:1px solid var(--border);color:var(--cream);border-radius:10px;padding:9px 12px;font-family:'Manrope';font-size:.9rem}
  .set-check{display:flex;align-items:center;gap:10px;cursor:pointer}
  .set-check input{width:18px;height:18px;accent-color:var(--gold);cursor:pointer}
  .admin-box{background:linear-gradient(160deg,#1c1712,#141210);border:1px solid #5a4a20;border-radius:14px;margin-top:16px;overflow:hidden}
  .admin-box summary{list-style:none;cursor:pointer;padding:14px 16px;font-weight:700;color:#e0b84c;display:flex;justify-content:space-between;align-items:center}
  .admin-box summary::-webkit-details-marker{display:none}
  .adm-sub summary::-webkit-details-marker{display:none}
  .adm-sub[open] summary .bi-chevron-down{transform:rotate(180deg)}
  .admin-body{padding:6px 16px 18px;display:flex;flex-direction:column;gap:16px}
  .adm-hours{display:flex;gap:8px;align-items:center}
  .adm-hours input{width:110px;background:var(--bg);border:1px solid var(--border);color:var(--cream);border-radius:10px;padding:9px 12px;font-family:'Manrope'}
  .adm-hours button,.adm-save{background:linear-gradient(102deg,#B98F3E,#F7E7B8 45%,#E7C878 65%,#B98F3E);color:#231A08;border:none;border-radius:10px;padding:9px 16px;font-weight:800;cursor:pointer;font-family:'Manrope'}
  .adm-chips{display:flex;flex-wrap:wrap;gap:8px}
  .adm-chip{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:6px 12px;font-size:.8rem;cursor:pointer;user-select:none;transition:.12s}
  .adm-chip.on{background:linear-gradient(102deg,#B98F3E,#E7C878);color:#231A08;border-color:transparent;font-weight:700}
  .nick-edit{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;text-decoration:underline;margin-top:4px}
  .nick-edit:hover{color:var(--gold)}
  .gender-switch{display:inline-flex;gap:0;margin-top:10px;border:1px solid var(--border);border-radius:20px;overflow:hidden}
  .gseg{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;font-weight:700;padding:6px 14px;font-family:'Manrope';transition:.15s}
  .gseg.on{background:linear-gradient(102deg,#B98F3E,#F7E7B8 45%,#E7C878 65%,#B98F3E);color:#231A08}
  .settings{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-top:16px;overflow:hidden}
  .settings summary{list-style:none;cursor:pointer;padding:14px 16px;font-weight:700;color:var(--gold);display:flex;justify-content:space-between;align-items:center}
  .settings summary::-webkit-details-marker{display:none}
  .settings summary .chev{color:var(--muted);transition:.2s}
  .settings[open] summary .chev{transform:rotate(180deg)}
  .settings-body{padding:4px 16px 18px;display:flex;flex-direction:column;gap:16px}
  .set-row{display:flex;flex-direction:column;gap:7px}
  .set-label{font-size:.76rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700}
  .set-nick{display:flex;gap:8px}
  .set-nick input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--cream);border-radius:10px;padding:10px 12px;font-family:'Manrope';font-size:.9rem}
  .set-nick input:focus{outline:none;border-color:var(--gold)}
  .set-nick button{background:linear-gradient(102deg,#B98F3E,#F7E7B8 45%,#E7C878 65%,#B98F3E);color:#231A08;border:none;border-radius:10px;padding:0 16px;font-weight:800;cursor:pointer;font-family:'Manrope';white-space:nowrap}
  .pname.glow{text-shadow:0 0 18px rgba(201,162,76,.65),0 0 4px rgba(201,162,76,.9)}
  .ptags{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px}
  .joined-date{margin-top:10px;font-size:.78rem;color:var(--muted)}
  .tag{background:rgba(201,162,76,.12);border:1px solid rgba(201,162,76,.3);color:var(--gold);padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 10px;text-align:center}
  .stat .n{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:600;color:var(--gold)}
  .stat .l{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
  .fbtn{width:100%;margin-top:6px;border:none;border-radius:12px;padding:13px;font-weight:800;font-size:.92rem;cursor:pointer;font-family:'Manrope'}
  .fbtn.add{background:linear-gradient(102deg,#B98F3E,#F7E7B8 36%,#E7C878 58%,#B98F3E);color:#231A08}
  .fbtn.sec{background:#241f17;border:1px solid var(--border);color:var(--cream)}
  .fbtn.ok{background:#1e2a1e;border:1px solid #35502f;color:#9fd894}
  .sec-title{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:800;margin:26px 0 12px}
  .ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:12px}
  .ach{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 8px;text-align:center;position:relative;transition:.2s}
  .ach.earned{border-color:rgba(201,162,76,.5);background:linear-gradient(160deg,#221d14,#191612)}
  .ach.earned .ico{filter:none}
  .ach .ico{font-size:1.9rem;filter:grayscale(1) opacity(.32)}
  .ach.earned .ico{text-shadow:0 0 14px rgba(201,162,76,.6)}
  .ach .an{font-size:.72rem;font-weight:700;margin-top:6px;color:var(--cream)}
  .ach:not(.earned) .an{color:var(--muted)}
  .ach .ad{font-size:.64rem;color:var(--muted);margin-top:2px;line-height:1.2}
  .ach .lock{position:absolute;top:6px;right:8px;font-size:.7rem;color:var(--muted)}

  .fa-lang-select:focus{outline:none;border-color:var(--gold)}

<div class="wrap">
  <div class="topbar">
    <a id="backLink" href="/client-dashboard" class="back"><i class="bi bi-arrow-left"></i> <span data-i18n="profile.back"></span></a>
  </div>
  <div id="host"><div class="empty" data-i18n="profile.loading"></div></div>
</div>
<script>
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const uid=location.pathname.split('/').pop();
let P=null;
const T=(k,v)=>window.FA_T(k,v);
function uploadAvatar(input){
  const file=input.files&&input.files[0]; input.value='';
  if(!file) return;
  const rd=new FileReader();
  rd.onload=e=>{ const img=new Image(); img.onload=async()=>{
    const max=400, sc=Math.min(1,max/Math.max(img.width,img.height));
    const c=document.createElement('canvas'); c.width=img.width*sc; c.height=img.height*sc;
    c.getContext('2d').drawImage(img,0,0,c.width,c.height);
    const data=c.toDataURL('image/jpeg',0.85);
    const r=await fetch('/api/client/avatar',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({avatar:data})});
    if(r.ok) location.reload(); else { const d=await r.json().catch(()=>({})); alert(d.error||'Chyba pri nahrávaní'); }
  }; img.src=e.target.result; };
  rd.readAsDataURL(file);
}

// ─── Pozadia profilu (odmena za privedených ľudí) ───
const BG_KEYS=['basic','spark','dawn','bloom','sunset','ocean','emerald','royal','nebula','aurora','galaxy','cosmos','nova','infinity'];
// Kompaktné gradienty pre náhľadové štvorčeky (bez duplikovania celého CSS)
const SW_BG={
  basic:'linear-gradient(150deg,#211d16,#141210)',
  spark:'radial-gradient(circle at 50% 0%,#2a2416,#141210)',
  dawn:'linear-gradient(160deg,#3a2410,#141210)',
  bloom:'linear-gradient(150deg,#3a1a3a,#141210)',
  sunset:'linear-gradient(150deg,#4a2010,#e94560 130%)',
  ocean:'linear-gradient(150deg,#0f3a5a,#0d1114)',
  emerald:'linear-gradient(150deg,#0f5a3a,#0d1310)',
  royal:'linear-gradient(150deg,#4a2a90,#100c18)',
  nebula:'radial-gradient(circle at 30% 20%,#e9458c,#3a2078 60%,#0e0a16)',
  aurora:'linear-gradient(150deg,#2ecc96,#5a8cff 60%,#b478dc)',
  galaxy:'radial-gradient(circle at 40% 30%,#785aff,#e9458c 70%,#0a0812)',
  cosmos:'radial-gradient(circle at 40% 30%,#ff78c8,#7864ff 60%,#08060f)',
  nova:'radial-gradient(circle at 50% 20%,#ffb450,#e94560 50%,#5a5aff 90%)',
  infinity:'radial-gradient(circle at 50% 15%,#f7e7b8,#785aff 45%,#e9458c 75%,#050409)',

};
function applyProfileBg(tier){
  document.body.className=document.body.className.replace(/\bpbg-\w+/g,'').trim();
  if(tier && tier!=='basic') document.body.classList.add('pbg-'+tier);
}
function bgGalleryHtml(){
  const tiers=P.bg_tiers||[]; const total=P.referrals||0;
  const cells=tiers.map(t=>{
    const cls=(t.unlocked?'unlocked':'locked')+(t.current?' cur':'');
    const need=t.need===0?'základné':(t.need+' ľudí');
    return `<div class="bgsw ${cls}" onclick="clickBg('${t.key}',${t.unlocked},${t.need},'${esc(t.name)}')">
      <div class="prev" style="background:${SW_BG[t.key]||SW_BG.basic}">${t.unlocked?'':'<span class="lock">🔒</span>'}${t.current?'<span class="lock">✓</span>':''}</div>
      <div class="meta"><div class="nm">${esc(t.name)}</div><div class="nd">${need}</div></div>
    </div>`;
  }).join('');
  return `<details class="bgg">
    <summary><span>🎨 Pozadia profilu <span style="color:var(--muted);font-weight:400;font-size:.8rem">· za privedených ľudí</span></span><i class="bi bi-chevron-down chev"></i></summary>
    <div class="bgg-body">
      <div class="bgg-hint">${P.can_custom_bg&&P.is_self
        ? 'Ako admin/zakladateľ máš odomknuté <b style="color:var(--gold)">všetky pozadia</b> vrátane exkluzívneho 👑 Zakladateľ. Klikni na ktorékoľvek a hneď sa nastaví ako tvoje.'
        : `Pozadie celého profilu je odmena za ľudí, ktorých privedieš do svojej štruktúry. Čím viac ľudí, tým krajšie pozadie. Máš <b style="color:var(--gold)">${total}</b> ${total===1?'človeka':'ľudí'}. Klikni na náhľad — odomknuté si vyskúšaš, pri zamknutom uvidíš, koľko ešte treba. 💛`}</div>
      <div class="bgg-grid">${cells}</div>
    </div>
  </details>
  <div class="bgg-preview-bar" id="bgPrevBar"><span id="bgPrevTxt"></span><button onclick="endPreview()">Späť</button></div>`;
}
function clickBg(key,unlocked,need,name){
  if(P.can_custom_bg && P.is_self){ setCustomBg(key,name); return; } // admin/zakladateľ nastaví natrvalo
  if(unlocked){ applyProfileBg(key); showPreviewBar('Náhľad: '+name+(key===P.bg_tier?' (tvoje aktuálne)':' — takto by to vyzeralo')); }
  else { applyProfileBg(key); showPreviewBar('🔒 „'+name+'" odomkneš, keď privedieš '+need+' ľudí do štruktúry.'); }
}
async function setCustomBg(key,name){
  applyProfileBg(key);
  const ok=await putProfile({custom_bg:key});
  if(ok){ P.bg_tier=key; P.custom_bg=key; showPreviewBar('✓ Nastavené ako tvoje pozadie: '+name); redraw(true); }
  else applyProfileBg(P.bg_tier);
}
function showPreviewBar(txt){ const b=document.getElementById('bgPrevBar'); if(b){ document.getElementById('bgPrevTxt').textContent=txt; b.classList.add('on'); } }
function endPreview(){ applyProfileBg(P.bg_tier); const b=document.getElementById('bgPrevBar'); if(b) b.classList.remove('on'); }
async function load(){
  try{ const cfg=await (await fetch('/api/config')).json(); if(cfg?.paypal_client_id) window.__PAYPAL_CLIENT_ID__=cfg.paypal_client_id; }catch(e){}
  const r=await fetch('/api/profile/'+encodeURIComponent(uid),{credentials:'include'});
  if(r.status===401){ location.href='/?next='+encodeURIComponent(location.pathname); return; }
  if(!r.ok){ let em=''; try{ em=(await r.json()).error||''; }catch(e){} document.getElementById('host').innerHTML='<div class="empty">'+T('profile.load_fail')+(em?('<br><small style="opacity:.6">'+esc(em)+'</small>'):'')+' <br><small style="opacity:.5">('+r.status+')</small></div>'; return; }
  P=await r.json();
  // Apply the logged-in viewer's saved language (server wins over localStorage)
  if(P.viewer_lang && P.viewer_lang!==FA_I18N.lang){ localStorage.setItem('fa_lang',P.viewer_lang); location.reload(); return; }
  render();
  FA_I18N.mount('langMount'); // switcher lives inside the settings panel
  // Admin sa vráti do admin panelu, klient na svoj dashboard
  const bl=document.getElementById('backLink'); if(bl && P.viewer_is_admin && !P.is_self){ bl.href='/admin'; }
}
function friendBtn(){
  if(P.friend_state==='self') return '';
  if(P.anonymous) return '';
  if(P.friend_state==='friends') return `<button class="fbtn ok" onclick="rmFriend()"><i class="bi bi-check-circle-fill"></i> ${T('profile.friends_remove')}</button>`;
  if(P.friend_state==='requested') return `<button class="fbtn sec" onclick="rmFriend()"><i class="bi bi-hourglass-split"></i> ${T('profile.friend_sent')}</button>`;
  if(P.friend_state==='incoming') return `<button class="fbtn add" onclick="accept()"><i class="bi bi-person-check-fill"></i> ${T('profile.friend_accept')}</button>`;
  return `<button class="fbtn add" onclick="addFriend()"><i class="bi bi-person-plus-fill"></i> ${T('profile.friend_add')}</button>`;
}
function render(){

  const flex=P.earned_count>=5?'glow':'';
  const earned=P.achievements.filter(a=>a.earned), locked=P.achievements.filter(a=>!a.earned);
  const achCard=a=>`<div class="ach ${a.earned?'earned':''}">
     ${a.earned?'':'<span class="lock"><i class="bi bi-lock-fill"></i></span>'}

     ${a.earned?'':`<div class="prog"><i style="width:${a.progress}%"></i></div>`}
   </div>`;
  applyProfileBg(P.bg_tier); // pozadie celej stránky podľa štruktúry
  document.getElementById('host').innerHTML=`
    <div class="hero ${P.is_founder?'founder':''} ${P.membership_tier?'mem-'+esc(P.membership_tier):''}">
      <div class="avatar" ${P.is_self?'onclick="document.getElementById(\'avatarInput\').click()" style="cursor:pointer" title="Zmeniť profilovku"':''}>${av}${P.is_self?'<span class="av-cam"><i class="bi bi-camera-fill"></i></span>':''}</div>
      ${P.is_self?'<input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar(this)">':''}
      ${P.is_founder?'<div class="founder-crown">👑 Zakladateľ Fusion Academy</div>':''}
      ${P.membership_tier?`<div class="mem-badge mem-${esc(P.membership_tier)}">${P.membership_tier==='gold'?'👑':P.membership_tier==='silver'?'⭐':'🥉'} ${esc(P.membership_name||P.membership_tier)} ${memberWord}</div>`:''}
      ${P.name_badge?`<div class="name-badge">${P.name_badge.emoji} ${esc(P.name_badge.title)}</div>`:''}
      <div class="pname ${flex}">${P.name_badge?P.name_badge.emoji+' ':''}${esc(P.name)}</div>
      ${P.nickname?`<div class="pnick">„${esc(P.nickname)}"</div>`:''}
      ${P.status?`<div class="pstatus">„${esc(P.status)}"</div>`:''}
      <div class="ptags">

        ${P.is_trainer?(( (P.taught_group_hours||0)<100 )
          ? '<span class="tag" style="background:linear-gradient(102deg,#5a7a3a,#8bc34a);color:#0d1a05;border:none;font-weight:800">🎓 Tréner v zácviku</span>'
          : '<span class="tag" style="background:linear-gradient(102deg,#B98F3E,#E7C878);color:#231A08;border:none;font-weight:800">🎓 Tréner</span>'):''}
        <span class="tag">${P.member_badge?.emoji||'🌱'} ${esc(P.member_badge?.label||'Nováčik')}</span>
        <span class="tag">🏅 ${esc(P.loyalty_label)}</span>
        <span class="tag">🏆 ${T('profile.badges_of',{n:P.earned_count,m:P.total_count})}</span>
      </div>
      ${P.is_trainer?`<div class="ptags" style="margin-top:8px">
        <span class="tag">🎵 ${P.taught_group_hours||0} skupinových hodín${(P.taught_group_hours||0)<100?` <span style="opacity:.7">/ 100 zácvik</span>`:''}</span>
        <span class="tag">🔑 ${P.taught_private_hours||0} súkromných hodín</span>
      </div>`:''}
      ${P.joined?`<div class="joined-date">💛 ${T('profile.member_since',{who:T(isM?'profile.member_m':'profile.member_f'),date:new Date(P.joined).toLocaleDateString(LOC,{month:'long',year:'numeric'})})}</div>`:''}
      <div>${P.is_self
        ? `<button class="like-btn" disabled style="opacity:.75;cursor:default"><i class="bi bi-heart-fill"></i> ${T('profile.likes',{n:P.likes||0})}</button>`
        : `<button id="likeBtn" class="like-btn ${P.liked_by_me?'liked':''}" onclick="toggleLike()"><i class="bi ${P.liked_by_me?'bi-heart-fill':'bi-heart'}"></i> <span id="likeCount">${P.likes||0}</span></button>`}</div>
    </div>
    ${(P.is_self||P.viewer_is_admin) && P.bg_tiers ? bgGalleryHtml() : ''}
    ${P.is_self ? `<details class="settings">
      <summary>${T('settings.title')} <i class="bi bi-chevron-down chev"></i></summary>
      <div class="settings-body">
        <div class="set-row">
          <span class="set-label">${T('settings.nickname')}</span>
          <input id="nickInput" maxlength="30" value="${esc(P.nickname||'')}" placeholder="${T('settings.nick_ph')}" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--cream);border-radius:10px;padding:10px 12px;font-family:'Manrope';font-size:.9rem">
        </div>
        <div class="set-row set-status">
          <span class="set-label">${T('settings.status')}</span>
          <textarea id="statusInput" maxlength="120" placeholder="${T('settings.status_ph')}">${esc(P.status||'')}</textarea>
          <span class="set-hint">${T('settings.status_hint')}</span>

          <label class="set-check">
            <input type="checkbox" id="anonInput" ${P.anonymous?'checked':''}>
            <span><b style="font-size:.86rem">${T('settings.anonymous')}</b><span class="set-hint" style="display:block">${T('settings.anon_hint')}</span></span>

      </div>
    </details>` : ''}
    ${P.viewer_is_admin ? `<details class="admin-box" id="adminBox" ontoggle="if(this.open)loadAdminAwards()">
      <summary><span>🛠️ Admin – správa profilu</span><i class="bi bi-chevron-down"></i></summary>
      <div class="admin-body" id="adminBody"><div class="empty">Načítavam…</div></div>
    </details>` : ''}
    ${P.anonymous && !P.is_self ? `<div class="anon-note">${T('profile.anon')}</div>` : `
    <div class="stats">
      <div class="stat"><div class="n">${P.visits}</div><div class="l">${T('profile.stat_visits')}</div></div>
      <div class="stat"><div class="n">${P.referrals}</div><div class="l">${T('profile.stat_struct')}</div></div>
      <div class="stat"><div class="n">${P.months_member}</div><div class="l">${T('profile.stat_months')}</div></div>
    </div>
    ${friendBtn()}
    ${(!P.is_self && !P.anonymous) ? `<a class="msg-btn" href="/community?dm=${P.id}"><i class="bi bi-chat-dots-fill"></i> ${T('profile.msg')}</a>` : ''}
    ${(!P.is_self && !P.anonymous && P.viewer_logged_in && !P.can_receive_tips) ? `<button class="report-btn" style="background:#2a2410;border-color:#5a4a20;color:#e0b84c" onclick="openGiftCredit()"><i class="bi bi-gift"></i> Darovať kredit</button>` : ''}
    ${(P.can_receive_tips && !P.is_self && P.viewer_logged_in) ? `<button class="report-btn" style="background:linear-gradient(102deg,#3a2a10,#5a4520);border-color:#C9A84C;color:#E7C878;font-weight:800" onclick="openTip()">💛 Pošli tip trénerovi</button>` : ''}
    ${(P.is_admin_profile && !P.is_self) ? `<button class="report-btn" onclick="openReport()"><i class="bi bi-question-circle"></i> Napísať otázku / nahlásiť chybu</button>` : ''}
    ${P.points ? `<details class="pts-box">
      <summary><span>⭐ ${T('profile.points_title')} <b style="color:var(--gold)">${P.points.total}</b></span><i class="bi bi-chevron-down"></i></summary>

    <div class="sec-title">${T('profile.earned_title',{n:earned.length})}</div>
    <div class="ach-grid">${earned.length?earned.map(achCard).join(''):`<div class="empty">${T('profile.no_badges')}</div>`}</div>

    <div class="sec-title">${T('profile.comments_title')}</div>
    ${P.anonymous && !P.is_self ? '' : `<div class="cmt-form">
      <textarea id="cmtText" maxlength="500" placeholder="${T(P.is_self?'profile.cmt_ph_self':'profile.cmt_ph')}"></textarea>
      <button onclick="sendComment()">${T('profile.cmt_add')}</button>
    </div>`}
    <div id="cmtList"><div class="empty">${T('profile.cmt_loading')}</div></div>
  `;
  loadComments();
  if(P.can_receive_tips) loadTips();
}

// ── Tipy (dank) ───────────────────────────────────────────────────────────────
async function loadTips(){
  const box=document.getElementById('tipsFeed'); if(!box) return;
  try{
    const d=await (await fetch('/api/tips/for/'+encodeURIComponent(uid))).json();
    _tipData=d;
    const LOC={sk:'sk-SK',cs:'cs-CZ',en:'en-GB',uk:'uk-UA',hu:'hu-HU',de:'de-DE'}[FA_I18N.lang]||'sk-SK';
    const eur=v=>(+v||0).toFixed(2).replace('.',',')+' €';
    // Cieľ (goal bar)
    let goalHtml='';
    if(d.goal){
      const pct=Math.min(100,Math.round((d.total||0)/d.goal.amount*100));
      goalHtml=`<div style="background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.3);border-radius:14px;padding:12px 14px;margin-bottom:12px">

async function submitTip(){

  if(!(_tipAmount>=1)){ box.innerHTML='<span style="color:#e0577b">Zadaj sumu aspoň 1 €.</span>'; return; }
  box.innerHTML='<span style="color:var(--muted)">Pripravujem platbu…</span>';
  const r=await fetch('/api/tips/create',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({to_user_id:uid,amount:_tipAmount,message:msg,anonymous})}).then(x=>x.json()).catch(()=>null);
  if(!r||r.error){ box.innerHTML='<span style="color:#e0577b">'+((r&&r.error)||'Chyba')+'</span>'; return; }
  if(r.demo){ box.innerHTML='<span style="color:#8bc34a">✓ Tip zaznamenaný (demo režim). Ďakujeme!</span>'; setTimeout(()=>{document.getElementById('tipModal')?.remove(); loadTips();},1200); return; }

  box.innerHTML='';
  paypal.Buttons({
    createOrder:()=>r.paypalOrderId,
    onApprove: async()=>{
      box.innerHTML='<span style="color:var(--gold)">⏳ Spracúvam…</span>';
      const c=await fetch('/api/paypal/capture-order',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({paypalOrderId:r.paypalOrderId,paymentId:r.paymentId})}).then(x=>x.json());
      if(c&&c.ok){ box.innerHTML='<span style="color:#8bc34a">✓ Ďakujeme za tip! 💛</span>'; setTimeout(()=>{document.getElementById('tipModal')?.remove(); loadTips();},1400); }

    },
    onError:()=>{ box.innerHTML='<span style="color:#e0577b">Chyba PayPal.</span>'; }
  }).render('#tipPaypal');
}

}

async function loadProfileEarnings(){

    if(!r.ok){ box.innerHTML='<span class="set-hint">'+(d.error||'Chyba')+'</span>'; return; }
    const rows=(d.months||[]).filter(m=>m.total>0||m.sessions>0);
    const MN=['','jan','feb','mar','apr','máj','jún','júl','aug','sep','okt','nov','dec'];
    const fmtM=m=>{const[y,mo]=m.split('-');return MN[+mo]+' '+y;};
    let html=`<div style="display:flex;justify-content:space-between;background:rgba(201,168,76,.08);border:1px solid var(--gold-border,#5a4a20);border-radius:10px;padding:10px 12px;margin-bottom:8px"><span style="color:var(--text-muted)">Spolu 12 mes. (z toho affiliate ${(d.grand_affiliate||0).toFixed(2)} €)</span><b style="color:var(--gold)">${(d.grand_total||0).toFixed(2)} €</b></div>`;
    if(!rows.length){ box.innerHTML=html+'<span class="set-hint">Zatiaľ žiadne zárobky.</span>'; return; }
    html+=rows.map(M=>{
      const items=(M.items||[]).map(i=>{const det=(i.count!==''&&i.per!=='')?` · ${i.count}× ${typeof i.per==='string'?i.per:i.per+' €'}`:'';return `<div style="display:flex;justify-content:space-between;font-size:.78rem;padding:3px 0;color:var(--text-muted)"><span>${i.label}<span style="opacity:.7">${det}</span></span><span>${i.amount.toFixed(2)} €</span></div>`;}).join('');
      return `<details style="border-top:1px solid rgba(255,255,255,.06);padding:6px 0"><summary style="list-style:none;cursor:pointer;display:flex;justify-content:space-between;font-size:.85rem"><span>${fmtM(M.month)} · ${M.sessions} hod.${M.affiliate>0?' · aff '+M.affiliate.toFixed(0)+'€':''}</span><b style="color:#81c784">${M.total.toFixed(2)} €</b></summary><div style="padding:6px 0 4px">${items||'—'}</div></details>`;
    }).join('');
    box.innerHTML=html;
  } catch(e){ box.innerHTML='<span class="set-hint">Chyba pripojenia</span>'; }

  if(!confirm(msg)) return;
  const r=await fetch('/api/admin/users/'+encodeURIComponent(uid)+'/grant-membership',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',
    body:JSON.stringify({plan_id:plan_id||null, amount, expires_at, entries, gift, payment_method:gift?null:_admMode})});
  const d=await r.json();
  if(d.ok){ alert('✅ Hotovo. '+(d.plan_name!=='—'?('Členstvo '+d.plan_name+(d.expires_at?' do '+d.expires_at:'')+'. '):'')+(d.entries?('+'+d.entries+' vstupov.'):'')); location.reload(); }
  else alert('Chyba: '+(d.error||'?'));
}
async function toggleMerch(m){
  const s=new Set(_awards.merch_owned||[]);
  s.has(m)?s.delete(m):s.add(m);
  _awards.merch_owned=[...s];
  if(await putAwards({merch_owned:_awards.merch_owned})) renderAdmin();
}
async function toggleAch(id){
  const s=new Set(_awards.manual_achievements||[]);
  s.has(id)?s.delete(id):s.add(id);
  _awards.manual_achievements=[...s];
  if(await putAwards({manual_achievements:_awards.manual_achievements})) renderAdmin();
}
async function addFriend(){ const d=await post('/api/friends/request',{to:uid}); if(d.ok){P.friend_state=d.state;render();} }
async function accept(){ const d=await post('/api/friends/accept',{from:uid}); if(d.ok){P.friend_state=d.state;render();} }
async function rmFriend(){ const d=await post('/api/friends/remove',{user:uid}); if(d.ok){P.friend_state='none';render();} }
load();
