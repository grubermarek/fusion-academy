<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Profil – Fusion Academy</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/fa-theme.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="/i18n.js"></script>
<style>
  :root{--gold:#C9A24C;--cream:#EAE3D5;--muted:#8a8272;--bg:#141210;--card:#1b1916;--border:#2e2a20}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Manrope',system-ui,sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;padding:24px 16px 60px}
  .wrap{max-width:720px;margin:0 auto}
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:.85rem;margin-bottom:16px}
  .back:hover{color:var(--gold)}
  .hero{background:linear-gradient(150deg,#211d16,#15130f);border:1px solid var(--border);border-radius:20px;padding:30px 26px;text-align:center;position:relative;overflow:hidden}
  .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% -10%,rgba(201,162,76,.18),transparent 60%);pointer-events:none}
  /* Unlockable backgrounds (by achievement count) */
  .hero.bg-bronze{background:linear-gradient(150deg,#2a2016,#171009);border-color:rgba(205,127,50,.4)}
  .hero.bg-bronze::before{background:radial-gradient(circle at 50% -10%,rgba(205,127,50,.28),transparent 62%)}
  .hero.bg-silver{background:linear-gradient(150deg,#232630,#12141a);border-color:rgba(192,198,208,.4)}
  .hero.bg-silver::before{background:radial-gradient(circle at 30% -10%,rgba(192,198,208,.25),transparent 60%),radial-gradient(circle at 80% 10%,rgba(120,140,180,.18),transparent 55%)}
  .hero.bg-gold{background:linear-gradient(150deg,#2e2611,#1a1408);border-color:rgba(201,162,76,.55)}
  .hero.bg-gold::before{background:radial-gradient(circle at 50% -15%,rgba(247,231,184,.30),transparent 60%),radial-gradient(circle at 15% 90%,rgba(201,162,76,.22),transparent 55%)}
  .hero.bg-legend{background:linear-gradient(150deg,#2a1830,#0f0a14);border-color:rgba(180,120,220,.5);box-shadow:0 0 40px -12px rgba(180,120,220,.5)}
  .hero.bg-legend::before{background:radial-gradient(circle at 20% -10%,rgba(233,69,96,.22),transparent 55%),radial-gradient(circle at 80% 0%,rgba(120,140,255,.22),transparent 55%),radial-gradient(circle at 50% 110%,rgba(201,162,76,.25),transparent 55%);animation:auroraShift 8s ease-in-out infinite alternate}
  @keyframes auroraShift{from{opacity:.7;transform:scale(1)}to{opacity:1;transform:scale(1.15)}}
  /* Membership-level glow — everyone sees the client's tier shine */
  .hero.mem-bronze{box-shadow:0 0 34px -8px rgba(205,127,50,.65);border-color:rgba(205,127,50,.7)}
  .hero.mem-silver{box-shadow:0 0 38px -8px rgba(196,201,214,.7);border-color:rgba(196,201,214,.8)}
  .hero.mem-gold{box-shadow:0 0 46px -6px rgba(201,168,76,.85);border-color:rgba(247,231,184,.9);animation:memGoldPulse 3.2s ease-in-out infinite}
  @keyframes memGoldPulse{0%,100%{box-shadow:0 0 40px -8px rgba(201,168,76,.7)}50%{box-shadow:0 0 58px -4px rgba(247,231,184,.95)}}
  .mem-badge{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:.74rem;letter-spacing:.04em;text-transform:uppercase;padding:4px 14px;border-radius:20px;margin-bottom:8px}
  .mem-badge.mem-bronze{background:linear-gradient(102deg,#8a5320,#cd7f32 50%,#e0a86a);color:#231607;box-shadow:0 4px 14px -6px rgba(205,127,50,.8)}
  .mem-badge.mem-silver{background:linear-gradient(102deg,#8f939c,#e8ecf4 50%,#b9bfcb);color:#1a1c22;box-shadow:0 4px 14px -6px rgba(196,201,214,.8)}
  .mem-badge.mem-gold{background:linear-gradient(102deg,#B98F3E,#F7E7B8 45%,#E7C878 65%,#B98F3E);color:#231A08;box-shadow:0 4px 16px -5px rgba(201,168,76,.9)}
  @media(prefers-reduced-motion:reduce){.hero.mem-gold{animation:none}}
  .bg-hint{text-align:center;color:var(--muted);font-size:.78rem;margin-top:10px}
  .msg-btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:10px;background:#241f17;border:1px solid var(--border);color:var(--cream);border-radius:12px;padding:12px;font-weight:700;font-size:.9rem;text-decoration:none;font-family:'Manrope'}
  .msg-btn:hover{border-color:var(--gold);color:var(--gold)}
  .avatar{width:104px;height:104px;border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:600;color:#1a1710;background:linear-gradient(135deg,var(--gold),#a07830);overflow:hidden;border:3px solid rgba(201,162,76,.4);box-shadow:0 0 30px -6px rgba(201,162,76,.5)}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .name-badge{display:inline-block;background:linear-gradient(102deg,#B98F3E,#F7E7B8 40%,#E7C878 60%,#B98F3E);color:#231A08;font-weight:800;font-size:.72rem;letter-spacing:.03em;text-transform:uppercase;padding:3px 12px;border-radius:20px;margin-bottom:8px;box-shadow:0 4px 14px -6px rgba(201,162,76,.7)}
  .pname{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;line-height:1.1}
  .pnick{color:var(--gold);font-size:.92rem;font-weight:700;margin-top:3px}
  .pstatus{color:var(--cream);font-size:.9rem;font-style:italic;opacity:.85;margin-top:8px;max-width:420px;margin-left:auto;margin-right:auto;line-height:1.4}
  .set-hint{font-size:.74rem;color:var(--muted);line-height:1.4}
  .pts-box{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-top:14px;overflow:hidden}
  .pts-box summary{list-style:none;cursor:pointer;padding:13px 16px;font-weight:700;display:flex;justify-content:space-between;align-items:center;color:var(--cream)}
  .pts-box summary::-webkit-details-marker{display:none}
  .pts-box[open] summary i{transform:rotate(180deg)}
  .pts-box summary i{transition:.2s;color:var(--muted)}
  .pts-body{padding:2px 16px 14px}
  .pts-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid var(--border);font-size:.88rem}
  .pts-row b{color:var(--gold);white-space:nowrap}
  .pts-sub{color:var(--muted);font-size:.76rem}
  .pts-total{border-bottom:none;padding-top:12px;font-size:1rem}
  .pts-total b{color:var(--cream)}
  .set-status textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--cream);border-radius:10px;padding:10px 12px;font-family:'Manrope';font-size:.9rem;resize:vertical;min-height:44px}
  .set-status textarea:focus{outline:none;border-color:var(--gold)}
  .set-inline{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .set-inline input[type=date]{background:var(--bg);border:1px solid var(--border);color:var(--cream);border-radius:10px;padding:9px 12px;font-family:'Manrope';font-size:.9rem}
  .set-check{display:flex;align-items:center;gap:10px;cursor:pointer}
  .set-check input{width:18px;height:18px;accent-color:var(--gold);cursor:pointer}
  .admin-box{background:linear-gradient(160deg,#1c1712,#141210);border:1px solid #5a4a20;border-radius:14px;margin-top:16px;overflow:hidden}
  .admin-box summary{list-style:none;cursor:pointer;padding:14px 16px;font-weight:700;color:#e0b84c;display:flex;justify-content:space-between;align-items:center}
  .admin-box summary::-webkit-details-marker{display:none}
  .admin-body{padding:6px 16px 18px;display:flex;flex-direction:column;gap:16px}
  .adm-hours{display:flex;gap:8px;align-items:center}
  .adm-hours input{width:110px;background:var(--bg);border:1px solid var(--border);color:var(--cream);border-radius:10px;padding:9px 12px;font-family:'Manrope'}
  .adm-hours button,.adm-save{background:linear-gradient(102deg,#B98F3E,#F7E7B8 45%,#E7C878 65%,#B98F3E);color:#231A08;border:none;border-radius:10px;padding:9px 16px;font-weight:800;cursor:pointer;font-family:'Manrope'}
  .adm-chips{display:flex;flex-wrap:wrap;gap:8px}
  .adm-chip{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:6px 12px;font-size:.8rem;cursor:pointer;user-select:none;transition:.12s}
  .adm-chip.on{background:linear-gradient(102deg,#B98F3E,#E7C878);color:#231A08;border-color:transparent;font-weight:700}
  .nick-edit{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;text-decoration:underline;margin-top:4px}
  .nick-edit:hover{color:var(--gold)}
  .gender-switch{display:inline-flex;gap:0;margin-top:10px;border:1px solid var(--border);border-radius:20px;overflow:hidden}
  .gseg{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;font-weight:700;padding:6px 14px;font-family:'Manrope';transition:.15s}
  .gseg.on{background:linear-gradient(102deg,#B98F3E,#F7E7B8 45%,#E7C878 65%,#B98F3E);color:#231A08}
  .settings{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-top:16px;overflow:hidden}
  .settings summary{list-style:none;cursor:pointer;padding:14px 16px;font-weight:700;color:var(--gold);display:flex;justify-content:space-between;align-items:center}
  .settings summary::-webkit-details-marker{display:none}
  .settings summary .chev{color:var(--muted);transition:.2s}
  .settings[open] summary .chev{transform:rotate(180deg)}
  .settings-body{padding:4px 16px 18px;display:flex;flex-direction:column;gap:16px}
  .set-row{display:flex;flex-direction:column;gap:7px}
  .set-label{font-size:.76rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700}
  .set-nick{display:flex;gap:8px}
  .set-nick input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--cream);border-radius:10px;padding:10px 12px;font-family:'Manrope';font-size:.9rem}
  .set-nick input:focus{outline:none;border-color:var(--gold)}
  .set-nick button{background:linear-gradient(102deg,#B98F3E,#F7E7B8 45%,#E7C878 65%,#B98F3E);color:#231A08;border:none;border-radius:10px;padding:0 16px;font-weight:800;cursor:pointer;font-family:'Manrope';white-space:nowrap}
  .pname.glow{text-shadow:0 0 18px rgba(201,162,76,.65),0 0 4px rgba(201,162,76,.9)}
  .ptags{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px}
  .joined-date{margin-top:10px;font-size:.78rem;color:var(--muted)}
  .tag{background:rgba(201,162,76,.12);border:1px solid rgba(201,162,76,.3);color:var(--gold);padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 10px;text-align:center}
  .stat .n{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:600;color:var(--gold)}
  .stat .l{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
  .fbtn{width:100%;margin-top:6px;border:none;border-radius:12px;padding:13px;font-weight:800;font-size:.92rem;cursor:pointer;font-family:'Manrope'}
  .fbtn.add{background:linear-gradient(102deg,#B98F3E,#F7E7B8 36%,#E7C878 58%,#B98F3E);color:#231A08}
  .fbtn.sec{background:#241f17;border:1px solid var(--border);color:var(--cream)}
  .fbtn.ok{background:#1e2a1e;border:1px solid #35502f;color:#9fd894}
  .sec-title{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:800;margin:26px 0 12px}
  .ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:12px}
  .ach{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 8px;text-align:center;position:relative;transition:.2s}
  .ach.earned{border-color:rgba(201,162,76,.5);background:linear-gradient(160deg,#221d14,#191612)}
  .ach.earned .ico{filter:none}
  .ach .ico{font-size:1.9rem;filter:grayscale(1) opacity(.32)}
  .ach.earned .ico{text-shadow:0 0 14px rgba(201,162,76,.6)}
  .ach .an{font-size:.72rem;font-weight:700;margin-top:6px;color:var(--cream)}
  .ach:not(.earned) .an{color:var(--muted)}
  .ach .ad{font-size:.64rem;color:var(--muted);margin-top:2px;line-height:1.2}
  .ach .lock{position:absolute;top:6px;right:8px;font-size:.7rem;color:var(--muted)}
  .prog{height:4px;background:#0f0d0b;border-radius:3px;margin-top:7px;overflow:hidden}
  .prog>i{display:block;height:100%;background:var(--gold)}
  .empty{color:var(--muted);text-align:center;padding:20px;font-size:.9rem}
  .anon-note{background:#221d14;border:1px solid var(--border);border-radius:12px;padding:14px;color:var(--muted);font-size:.85rem;text-align:center;margin-top:16px}
  .like-btn{display:inline-flex;align-items:center;gap:8px;margin-top:14px;background:#241f17;border:1px solid var(--border);color:var(--cream);border-radius:24px;padding:9px 20px;font-weight:700;font-size:.92rem;cursor:pointer;font-family:'Manrope';transition:.15s}
  .like-btn:hover{border-color:#e0577b;color:#f2889f}
  .like-btn.liked{background:linear-gradient(102deg,#7a2438,#b0324f);border-color:#e0577b;color:#ffd7e0}
  .like-btn .bi{font-size:1.05rem}
  .like-btn.pop{animation:likePop .35s ease}
  @keyframes likePop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
  .cmt-form{display:flex;gap:8px;margin-bottom:16px}
  .cmt-form textarea{flex:1;background:var(--card);border:1px solid var(--border);color:var(--cream);border-radius:12px;padding:11px 13px;font-family:'Manrope';font-size:.9rem;resize:vertical;min-height:44px}
  .cmt-form textarea:focus{outline:none;border-color:var(--gold)}
  .cmt-form button{align-self:flex-end;background:linear-gradient(102deg,#B98F3E,#F7E7B8 40%,#E7C878 60%,#B98F3E);color:#231A08;border:none;border-radius:12px;padding:11px 18px;font-weight:800;cursor:pointer;font-family:'Manrope'}
  .cmt{display:flex;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin-bottom:10px;position:relative}
  .cmt-av{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;color:#1a1710;background:linear-gradient(135deg,var(--gold),#a07830);overflow:hidden;font-size:.9rem}
  .cmt-av img{width:100%;height:100%;object-fit:cover}
  .cmt-body{flex:1;min-width:0}
  .cmt-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .cmt-name{font-weight:700;font-size:.86rem;color:var(--cream)}
  .cmt-name a{color:var(--cream);text-decoration:none}
  .cmt-name a:hover{color:var(--gold)}
  .cmt-time{font-size:.7rem;color:var(--muted)}
  .cmt-text{font-size:.9rem;color:#d8d2c4;margin-top:3px;word-wrap:break-word;white-space:pre-wrap}
  .cmt-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;padding:0 2px}
  .cmt-del:hover{color:#e0577b}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px}
  .fa-lang-select{background:var(--card);border:1px solid var(--border);color:var(--cream);border-radius:10px;padding:6px 10px;font-family:'Manrope';font-size:.82rem;cursor:pointer}
  .fa-lang-select:focus{outline:none;border-color:var(--gold)}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a id="backLink" href="/client-dashboard" class="back"><i class="bi bi-arrow-left"></i> <span data-i18n="profile.back"></span></a>
  </div>
  <div id="host"><div class="empty" data-i18n="profile.loading"></div></div>
</div>
<script>
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const uid=location.pathname.split('/').pop();
let P=null;
const T=(k,v)=>window.FA_T(k,v);
async function load(){
  const r=await fetch('/api/profile/'+encodeURIComponent(uid),{credentials:'include'});
  if(r.status===401){ location.href='/?next='+encodeURIComponent(location.pathname); return; }
  if(!r.ok){ document.getElementById('host').innerHTML='<div class="empty">'+T('profile.load_fail')+'</div>'; return; }
  P=await r.json();
  // Apply the logged-in viewer's saved language (server wins over localStorage)
  if(P.viewer_lang && P.viewer_lang!==FA_I18N.lang){ localStorage.setItem('fa_lang',P.viewer_lang); location.reload(); return; }
  render();
  FA_I18N.mount('langMount'); // switcher lives inside the settings panel
  // Admin sa vráti do admin panelu, klient na svoj dashboard
  const bl=document.getElementById('backLink'); if(bl && P.viewer_is_admin && !P.is_self){ bl.href='/admin'; }
}
function friendBtn(){
  if(P.friend_state==='self') return '';
  if(P.anonymous) return '';
  if(P.friend_state==='friends') return `<button class="fbtn ok" onclick="rmFriend()"><i class="bi bi-check-circle-fill"></i> ${T('profile.friends_remove')}</button>`;
  if(P.friend_state==='requested') return `<button class="fbtn sec" onclick="rmFriend()"><i class="bi bi-hourglass-split"></i> ${T('profile.friend_sent')}</button>`;
  if(P.friend_state==='incoming') return `<button class="fbtn add" onclick="accept()"><i class="bi bi-person-check-fill"></i> ${T('profile.friend_accept')}</button>`;
  return `<button class="fbtn add" onclick="addFriend()"><i class="bi bi-person-plus-fill"></i> ${T('profile.friend_add')}</button>`;
}
function render(){
  const isM=P.gender==='male';
  const memberWord=T(isM?'profile.membtag_m':'profile.membtag_f');
  const LOC={sk:'sk-SK',cs:'cs-CZ',en:'en-GB',uk:'uk-UA',hu:'hu-HU',de:'de-DE'}[FA_I18N.lang]||'sk-SK';
  const initials=(P.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const av=P.avatar?`<img src="${P.avatar}" alt="">`:esc(initials);
  const flex=P.earned_count>=5?'glow':'';
  const earned=P.achievements.filter(a=>a.earned), locked=P.achievements.filter(a=>!a.earned);
  const achCard=a=>`<div class="ach ${a.earned?'earned':''}">
     ${a.earned?'':'<span class="lock"><i class="bi bi-lock-fill"></i></span>'}
     <div class="ico">${a.icon}</div><div class="an">${esc(a.name)}</div><div class="ad">${esc(a.desc)}</div>
     ${a.earned?'':`<div class="prog"><i style="width:${a.progress}%"></i></div>`}
   </div>`;
  const bgNames={bronze:T('bg.bronze'),silver:T('bg.silver'),gold:T('bg.gold'),legend:T('bg.legend')};
  document.getElementById('host').innerHTML=`
    <div class="hero bg-${esc(P.bg_tier||'basic')} ${P.membership_tier?'mem-'+esc(P.membership_tier):''}">
      <div class="avatar">${av}</div>
      ${P.membership_tier?`<div class="mem-badge mem-${esc(P.membership_tier)}">${P.membership_tier==='gold'?'👑':P.membership_tier==='silver'?'⭐':'🥉'} ${esc(P.membership_name||P.membership_tier)} ${memberWord}</div>`:''}
      ${P.name_badge?`<div class="name-badge">${P.name_badge.emoji} ${esc(P.name_badge.title)}</div>`:''}
      <div class="pname ${flex}">${P.name_badge?P.name_badge.emoji+' ':''}${esc(P.name)}</div>
      ${P.nickname?`<div class="pnick">„${esc(P.nickname)}"</div>`:''}
      ${P.status?`<div class="pstatus">„${esc(P.status)}"</div>`:''}
      <div class="ptags">
        <span class="tag">${P.member_badge?.emoji||'🌱'} ${esc(P.member_badge?.label||'Nováčik')}</span>
        <span class="tag">🏅 ${esc(P.loyalty_label)}</span>
        <span class="tag">🏆 ${T('profile.badges_of',{n:P.earned_count,m:P.total_count})}</span>
      </div>
      ${P.joined?`<div class="joined-date">💛 ${T('profile.member_since',{who:T(isM?'profile.member_m':'profile.member_f'),date:new Date(P.joined).toLocaleDateString(LOC,{month:'long',year:'numeric'})})}</div>`:''}
      <div>${P.is_self
        ? `<button class="like-btn" disabled style="opacity:.75;cursor:default"><i class="bi bi-heart-fill"></i> ${T('profile.likes',{n:P.likes||0})}</button>`
        : `<button id="likeBtn" class="like-btn ${P.liked_by_me?'liked':''}" onclick="toggleLike()"><i class="bi ${P.liked_by_me?'bi-heart-fill':'bi-heart'}"></i> <span id="likeCount">${P.likes||0}</span></button>`}</div>
    </div>
    ${P.is_self && P.next_bg ? `<div class="bg-hint">${T('profile.bg_hint',{tier:'<b style="color:var(--gold)">'+(bgNames[P.next_bg.tier]||'')+'</b>',need:P.next_bg.need,have:P.earned_count})}</div>` : ''}
    ${P.is_self ? `<details class="settings">
      <summary>${T('settings.title')} <i class="bi bi-chevron-down chev"></i></summary>
      <div class="settings-body">
        <div class="set-row">
          <span class="set-label">${T('settings.nickname')}</span>
          <div class="set-nick">
            <input id="nickInput" maxlength="30" value="${esc(P.nickname||'')}" placeholder="${T('settings.nick_ph')}">
            <button onclick="saveNick()">${T('settings.save')}</button>
          </div>
        </div>
        <div class="set-row set-status">
          <span class="set-label">${T('settings.status')}</span>
          <textarea id="statusInput" maxlength="120" placeholder="${T('settings.status_ph')}">${esc(P.status||'')}</textarea>
          <span class="set-hint">${T('settings.status_hint')}</span>
          <div class="set-nick"><span style="flex:1"></span><button onclick="saveStatus()">${T('settings.save')}</button></div>
        </div>
        <div class="set-row">
          <span class="set-label">${T('settings.gender')}</span>
          <div class="gender-switch">
            <button class="gseg ${!isM?'on':''}" onclick="setGender('female')">${T('profile.gender_f')}</button>
            <button class="gseg ${isM?'on':''}" onclick="setGender('male')">${T('profile.gender_m')}</button>
          </div>
        </div>
        <div class="set-row">
          <span class="set-label">${T('settings.language')}</span>
          <span id="langMount"></span>
        </div>
        <div class="set-row">
          <span class="set-label">${T('settings.birthday')}</span>
          <div class="set-inline">
            <input type="date" id="bdayInput" value="${esc(P.birthday||'')}">
            <button class="gseg on" style="border:none;border-radius:10px;padding:9px 16px" onclick="saveBday()">${T('settings.save')}</button>
          </div>
        </div>
        <div class="set-row">
          <span class="set-label">${T('settings.anonymous')}</span>
          <label class="set-check">
            <input type="checkbox" id="anonInput" ${P.anonymous?'checked':''} onchange="saveAnon()">
            <span class="set-hint">${T('settings.anon_hint')}</span>
          </label>
        </div>
      </div>
    </details>` : ''}
    ${P.viewer_is_admin ? `<details class="admin-box" id="adminBox" ontoggle="if(this.open)loadAdminAwards()">
      <summary><span>🛠️ Admin – správa profilu</span><i class="bi bi-chevron-down"></i></summary>
      <div class="admin-body" id="adminBody"><div class="empty">Načítavam…</div></div>
    </details>` : ''}
    ${P.anonymous && !P.is_self ? `<div class="anon-note">${T('profile.anon')}</div>` : `
    <div class="stats">
      <div class="stat"><div class="n">${P.visits}</div><div class="l">${T('profile.stat_visits')}</div></div>
      <div class="stat"><div class="n">${P.referrals}</div><div class="l">${T('profile.stat_struct')}</div></div>
      <div class="stat"><div class="n">${P.months_member}</div><div class="l">${T('profile.stat_months')}</div></div>
    </div>
    ${friendBtn()}
    ${(!P.is_self && !P.anonymous) ? `<a class="msg-btn" href="/community?dm=${P.id}"><i class="bi bi-chat-dots-fill"></i> ${T('profile.msg')}</a>` : ''}
    ${P.points ? `<details class="pts-box">
      <summary><span>⭐ ${T('profile.points_title')} <b style="color:var(--gold)">${P.points.total}</b></span><i class="bi bi-chevron-down"></i></summary>
      <div class="pts-body">
        ${P.points.items.map(i=>`<div class="pts-row"><span>${i.icon} ${esc(i.label)} <span class="pts-sub">· ${i.count}× po ${i.per}</span></span><b>${i.points} b</b></div>`).join('')}
        <div class="pts-row pts-total"><b>${T('profile.points_total')}</b><b style="color:var(--gold)">⭐ ${P.points.total}</b></div>
      </div>
    </details>` : ''}
    <div class="sec-title">${T('profile.earned_title',{n:earned.length})}</div>
    <div class="ach-grid">${earned.length?earned.map(achCard).join(''):`<div class="empty">${T('profile.no_badges')}</div>`}</div>
    ${locked.length?`<div class="sec-title">${T('profile.to_unlock')}</div><div class="ach-grid">${locked.map(achCard).join('')}</div>`:''}
    `}
    <div class="sec-title">${T('profile.comments_title')}</div>
    ${P.anonymous && !P.is_self ? '' : `<div class="cmt-form">
      <textarea id="cmtText" maxlength="500" placeholder="${T(P.is_self?'profile.cmt_ph_self':'profile.cmt_ph')}"></textarea>
      <button onclick="sendComment()">${T('profile.cmt_add')}</button>
    </div>`}
    <div id="cmtList"><div class="empty">${T('profile.cmt_loading')}</div></div>
  `;
  loadComments();
}
async function loadComments(){
  const box=document.getElementById('cmtList'); if(!box) return;
  try{
    const r=await fetch('/api/profile/'+encodeURIComponent(uid)+'/comments',{credentials:'include'});
    const d=await r.json();
    if(!d.comments||!d.comments.length){ box.innerHTML='<div class="empty">'+T('profile.cmt_none')+'</div>'; return; }
    const LOC={sk:'sk-SK',cs:'cs-CZ',en:'en-GB',uk:'uk-UA',hu:'hu-HU',de:'de-DE'}[FA_I18N.lang]||'sk-SK';
    box.innerHTML=d.comments.map(c=>{
      const ini=(c.author_name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
      const av=c.author_avatar?`<img src="${c.author_avatar}" alt="">`:esc(ini);
      const t=new Date(c.created_at).toLocaleDateString(LOC,{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      return `<div class="cmt">
        <div class="cmt-av">${av}</div>
        <div class="cmt-body">
          <div class="cmt-head">
            <span class="cmt-name"><a href="/u/${c.author_id}">${esc(c.author_name)}</a></span>
            <span class="cmt-time">${t}${c.can_delete?` · <button class="cmt-del" onclick="delComment('${c.id}')" title="Zmazať"><i class="bi bi-trash"></i></button>`:''}</span>
          </div>
          <div class="cmt-text">${esc(c.text)}</div>
        </div>
      </div>`;
    }).join('');
  }catch(e){ box.innerHTML='<div class="empty">'+T('profile.cmt_fail')+'</div>'; }
}
async function toggleLike(){
  const btn=document.getElementById('likeBtn');
  const d=await post('/api/profile/'+encodeURIComponent(uid)+'/like',{});
  if(d.error) return;
  P.liked_by_me=d.liked; P.likes=d.likes;
  document.getElementById('likeCount').textContent=d.likes;
  btn.classList.toggle('liked',d.liked);
  btn.querySelector('.bi').className='bi '+(d.liked?'bi-heart-fill':'bi-heart');
  btn.classList.remove('pop'); void btn.offsetWidth; btn.classList.add('pop');
}
async function sendComment(){
  const ta=document.getElementById('cmtText'); const text=(ta.value||'').trim();
  if(!text) return;
  const d=await post('/api/profile/'+encodeURIComponent(uid)+'/comments',{text});
  if(d.error){ alert(d.error); return; }
  ta.value=''; loadComments();
}
async function delComment(cid){
  if(!confirm(T('profile.cmt_del_q'))) return;
  const r=await fetch('/api/profile/'+encodeURIComponent(uid)+'/comments/'+cid,{method:'DELETE',credentials:'include'});
  if(r.ok) loadComments();
}
async function post(url,body){ const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify(body)}); return r.json(); }
function redraw(keepOpen){ render(); FA_I18N.mount('langMount'); if(keepOpen){ const d=document.querySelector('.settings'); if(d) d.open=true; } }
function flashSaved(btn, then){ if(!btn){ then&&then(); return; } btn.textContent=T('settings.saved'); setTimeout(()=>then&&then(),900); }
async function putProfile(body){ const r=await fetch('/api/profile',{method:'PUT',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify(body)}); return r.ok; }
async function saveNick(){
  const inp=document.getElementById('nickInput'); if(!inp) return;
  const nickname=(inp.value||'').trim().slice(0,30);
  if(await putProfile({nickname})){ P.nickname=nickname; flashSaved(inp.nextElementSibling, ()=>redraw(true)); }
}
async function saveStatus(){
  const inp=document.getElementById('statusInput'); if(!inp) return;
  const status=(inp.value||'').trim().slice(0,120);
  const btn=inp.parentElement.querySelector('button');
  if(await putProfile({status})){ P.status=status; flashSaved(btn, ()=>redraw(true)); }
}
async function saveBday(){
  const inp=document.getElementById('bdayInput'); if(!inp) return;
  const birthday=inp.value||'';
  const btn=inp.nextElementSibling;
  if(await putProfile({birthday})){ P.birthday=birthday; flashSaved(btn, ()=>{ if(btn) btn.textContent=T('settings.save'); }); }
}
async function saveAnon(){
  const inp=document.getElementById('anonInput'); if(!inp) return;
  const anonymous=inp.checked;
  if(await putProfile({anonymous})){ P.anonymous=anonymous; }
}
// ── ADMIN: správa odznakov, merchu a odchodených hodín ─────────────────────────
let _awards=null;
const MERCH_LABELS={tielko:'🎽 Tielko',tricko:'👕 Tričko',taska:'👜 Taška',mikina:'🧥 Mikina'};
async function loadAdminAwards(){
  const box=document.getElementById('adminBody'); if(!box || _awards) return;
  const r=await fetch('/api/admin/users/'+encodeURIComponent(uid)+'/awards',{credentials:'include'});
  if(!r.ok){ box.innerHTML='<div class="empty">Chyba pri načítaní admin dát.</div>'; return; }
  _awards=await r.json();
  renderAdmin();
}
function renderAdmin(){
  const box=document.getElementById('adminBody'); if(!box) return;
  const a=_awards;
  const merchSet=new Set(a.merch_owned||[]);
  const manualSet=new Set(a.manual_achievements||[]);
  const merchChips=(a.merch_list||[]).map(m=>`<span class="adm-chip ${merchSet.has(m)?'on':''}" onclick="toggleMerch('${m}')">${MERCH_LABELS[m]||m}</span>`).join('');
  const achChips=(a.achievements||[]).map(ac=>`<span class="adm-chip ${manualSet.has(ac.id)?'on':(ac.earned?'on':'')}" style="${ac.earned&&!manualSet.has(ac.id)?'opacity:.6;cursor:default':''}" ${ac.earned&&!manualSet.has(ac.id)?'title="Získané automaticky"':`onclick="toggleAch('${ac.id}')"`}>${ac.icon} ${esc(ac.name)}</span>`).join('');
  box.innerHTML=`
    <div class="set-row">
      <span class="set-label">Odchodené hodiny (návštevy)</span>
      <div class="adm-hours">
        <input type="number" id="admHours" min="0" value="${a.visit_count||0}">
        <button onclick="saveHours()">Uložiť</button>
        <span class="set-hint">Ovplyvní odznaky za návštevy a vernostný level.</span>
      </div>
    </div>
    <div class="set-row">
      <span class="set-label">Súkromné hodiny</span>
      <div class="adm-hours">
        <input type="number" id="admPrivate" min="0" value="${a.private_hours||0}">
        <button onclick="savePrivate()">Uložiť</button>
        <span class="set-hint">Odomkne odznaky za súkromné hodiny (1 → 1000).</span>
      </div>
    </div>
    <div class="set-row">
      <span class="set-label">Merch (pridať/odobrať odznak)</span>
      <div class="adm-chips">${merchChips||'<span class="set-hint">—</span>'}</div>
    </div>
    <div class="set-row">
      <span class="set-label">Ručné udelenie odznakov</span>
      <div class="adm-chips">${achChips}</div>
      <span class="set-hint">Zvýraznené = udelené. Automaticky získané (napr. za návštevy) sú tiež zvýraznené.</span>
    </div>
    <div class="set-row">
      <span class="set-label">Sponzor (MLM štruktúra)</span>
      <div style="font-size:.85rem;margin-bottom:6px">${a.sponsor_name?`Aktuálny: <b style="color:var(--gold)">${esc(a.sponsor_name)}</b> <span class="set-hint">(${esc(a.sponsor_code||'')})</span>`:'<span class="set-hint">Bez sponzora — zaregistroval sa bez kódu.</span>'}</div>
      <div style="position:relative">
        <div class="adm-hours">
          <input type="text" id="spSearch" placeholder="🔍 Meno / email / kód sponzora…" oninput="searchSponsor()" autocomplete="off" style="flex:1">
          ${a.sponsor_id?`<button onclick="assignSponsor(null)" style="background:#3a1a1a;border:1px solid #8b3232;color:#ef9a9a;border-radius:10px;padding:9px 12px;cursor:pointer" title="Odobrať sponzora">✕</button>`:''}
        </div>
        <div id="spResults" style="display:none;position:absolute;z-index:20;left:0;right:0;top:calc(100% + 4px);background:#161512;border:1px solid var(--border);border-radius:10px;max-height:220px;overflow-y:auto"></div>
      </div>
      <span class="set-hint">Priraď sponzora, ak sa klient zaregistroval bez jeho kódu.</span>
    </div>`;
}
let _spTimer=null;
function searchSponsor(){ clearTimeout(_spTimer); _spTimer=setTimeout(runSponsorSearch,250); }
async function runSponsorSearch(){
  const q=document.getElementById('spSearch').value.trim();
  const box=document.getElementById('spResults');
  if(q.length<2){ box.style.display='none'; return; }
  const r=await fetch('/api/admin/user-search?q='+encodeURIComponent(q),{credentials:'include'});
  const d=await r.json(); const list=(d&&d.people)||[];
  if(!list.length){ box.innerHTML='<div class="set-hint" style="padding:10px">Nikto sa nenašiel.</div>'; box.style.display='block'; return; }
  box.innerHTML=list.map(p=>`<div onclick="assignSponsor('${p.id}')" style="padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:.85rem" onmouseenter="this.style.background='#222'" onmouseleave="this.style.background=''"><b>${esc(p.name)}</b> <span class="set-hint">${esc(p.code||'')} · ${esc(p.email||'')}</span></div>`).join('');
  box.style.display='block';
}
async function assignSponsor(id){
  const r=await fetch('/api/admin/users/'+encodeURIComponent(uid)+'/sponsor',{method:'PUT',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({sponsor_id:id})});
  const d=await r.json();
  if(d.ok){ _awards.sponsor_id=id; alert(id?'Sponzor priradený ✓':'Sponzor odobratý ✓'); location.reload(); }
  else alert(d.error||'Chyba');
}
async function putAwards(body){
  const r=await fetch('/api/admin/users/'+encodeURIComponent(uid)+'/awards',{method:'PUT',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify(body)});
  return r.ok;
}
async function saveHours(){
  const v=parseInt(document.getElementById('admHours').value)||0;
  if(await putAwards({visit_count:v})){ _awards.visit_count=v; P=null; alert('Uložené ✓ Obnovujem profil…'); location.reload(); }
}
async function savePrivate(){
  const v=parseInt(document.getElementById('admPrivate').value)||0;
  if(await putAwards({private_hours:v})){ _awards.private_hours=v; alert('Uložené ✓ Obnovujem profil…'); location.reload(); }
}
async function toggleMerch(m){
  const s=new Set(_awards.merch_owned||[]);
  s.has(m)?s.delete(m):s.add(m);
  _awards.merch_owned=[...s];
  if(await putAwards({merch_owned:_awards.merch_owned})) renderAdmin();
}
async function toggleAch(id){
  const s=new Set(_awards.manual_achievements||[]);
  s.has(id)?s.delete(id):s.add(id);
  _awards.manual_achievements=[...s];
  if(await putAwards({manual_achievements:_awards.manual_achievements})) renderAdmin();
}
async function setGender(g){
  if(P.gender===g) return;
  const r=await fetch('/api/profile',{method:'PUT',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({gender:g})});
  if(r.ok){ location.reload(); } // reload so achievements re-render with correct declension
}
async function addFriend(){ const d=await post('/api/friends/request',{to:uid}); if(d.ok){P.friend_state=d.state;render();} }
async function accept(){ const d=await post('/api/friends/accept',{from:uid}); if(d.ok){P.friend_state=d.state;render();} }
async function rmFriend(){ const d=await post('/api/friends/remove',{user:uid}); if(d.ok){P.friend_state='none';render();} }
load();
</script>
<script src="/dock.js"></script>
</body>
</html>
