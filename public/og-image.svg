<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#141414"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="50%" style="stop-color:#F0C060"/>
      <stop offset="100%" style="stop-color:#C9A84C"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(201,168,76,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow -->
  <ellipse cx="600" cy="315" rx="500" ry="280" fill="url(#glow)"/>
  <!-- Gold border lines -->
  <line x1="60" y1="60" x2="1140" y2="60" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
  <line x1="60" y1="570" x2="1140" y2="570" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
  <!-- Logo text -->
  <text x="600" y="260" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="88" font-weight="900" letter-spacing="6" fill="url(#gold)">FUSION</text>
  <text x="600" y="360" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="88" font-weight="900" letter-spacing="6" fill="url(#gold)">ACADEMY</text>
  <!-- Tagline -->
  <text x="600" y="430" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="28" fill="rgba(245,237,214,0.55)" letter-spacing="4">Tanec · Fitness · Wellness · Slovensko</text>
  <!-- URL -->
  <text x="600" y="530" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="rgba(201,168,76,0.6)" letter-spacing="2">latindancefusion.art</text>
</svg>
