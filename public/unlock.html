<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Odomkni viac – Fusion Academy</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
  :root{--gold:#C9A84C;--gold-border:#5a4a20;--bg:#0f0f0f;--card:#171717;--cream:#F5EDD6;--muted:#9a9a9a;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--cream);font-family:'Manrope',system-ui,Arial,sans-serif;line-height:1.6;}
  .wrap{max-width:560px;margin:0 auto;padding:22px 18px 60px;}
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:.85rem;margin-bottom:18px;}
  .hero{text-align:center;margin-bottom:8px;}
  .hero .ic{font-size:3.4rem;}
  .lockpill{display:inline-flex;align-items:center;gap:6px;background:#2a2410;color:var(--gold);border:1px solid var(--gold-border);border-radius:20px;padding:5px 14px;font-size:.78rem;font-weight:800;margin-bottom:12px;}
  h1{font-size:1.5rem;margin:.2rem 0 .4rem;}
  .sub{color:var(--muted);font-size:.95rem;margin-bottom:22px;text-align:center;}
  .card{background:var(--card);border:1px solid #262626;border-radius:16px;padding:18px 18px;margin-bottom:16px;}
  .card h3{margin:0 0 10px;font-size:1.05rem;color:var(--gold);}
  .card ul{margin:0;padding-left:20px;}
  .card li{margin:5px 0;font-size:.92rem;}
  .offer{background:linear-gradient(160deg,#231d0e,#171717);border:1px solid var(--gold-border);border-radius:16px;padding:18px;text-align:center;margin-bottom:16px;}
  .offer .big{font-size:1.15rem;font-weight:800;color:var(--gold);}
  .code{display:inline-block;font-family:monospace;font-weight:800;letter-spacing:1px;background:#0d0d0d;border:1px dashed var(--gold);color:var(--gold);border-radius:8px;padding:6px 14px;margin:8px 0;font-size:1.05rem;}
  .cta{display:block;width:100%;text-align:center;text-decoration:none;background:linear-gradient(102deg,#B98F3E,#E7C878);color:#231A08;font-weight:800;border:none;border-radius:14px;padding:15px;font-size:1rem;margin-bottom:10px;cursor:pointer;font-family:inherit;}
  .cta:disabled{opacity:.7;cursor:default;}
  .blog{display:block;text-align:center;color:var(--muted);text-decoration:none;font-size:.85rem;}
  .blog:hover{color:var(--gold);}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/community"><i class="bi bi-arrow-left"></i> Späť na nástenku</a>
  <div id="content"></div>
</div>
<script>
const BLOG='https://latindancefusion.art/blog';
const F={
  silver:{ ic:'🥈', tier:'Silver', title:'Silver výhody',
    sub:'Dve veci, ktoré z tanca robia skutočnú premenu — v jednom členstve.',
    what:['📊 <b>Metabolická analýza tela (Tanita)</b> — % tuku, svaly, metabolizmus, viscerálny tuk, všetko priebežne v mobile','💻 <b>Online hodiny LIVE</b> — cvič z domu, keď nestíhaš prísť do štúdia, aj o 22:00','📉 vidíš svoju krivku ísť správnym smerom — prestaneš hádať, začneš vedieť','🔁 <b>konzistencia</b> — presne tá, ktorá robí výsledky'],
    why:'Váha ti klame — dôležité je, <b>či páliš tuk a nie sval</b>. A najväčší zabijak výsledkov je <b>vynechaný tréning</b>. Silver rieši oboje: <b>analýzu tela</b> aj <b>online hodiny</b>, takže cvičíš a napreduješ aj vtedy, keď <i>ty</i> môžeš.',
    blog:'/metabolicka-analyza-fit-premena', offer:true },
  gold:{ ic:'🥇', tier:'Gold', title:'Gold výhody',
    sub:'Výživa, ktorá dokončí to, čo tanec začal — kompletne za teba vyriešená.',
    what:['🥤 <b>Herbalife F1 raňajky</b> — ~220 kcal · 18 g bielkovín · 23 vitamínov a minerálov, za ~1,50 € / porcia','🍽️ <b>Jedálniček na mieru na celý týždeň</b> — generátor podľa tvojich údajov, chutí, alergénov a cieľa','⏱️ raňajky za 30 sekúnd, zasýti na 3–4 hodiny','🔄 jedálniček si kedykoľvek pregeneruješ nanovo'],
    why:'„Brušáky sa robia v kuchyni." Až <b>80 % výsledku je o tom, čím telo kŕmiš</b>. V Gold máš <b>F1 raňajky v cene</b> aj <b>osobný jedálniček na celý týždeň</b> — nič nemusíš vymýšľať, len sa najesť a tancovať.',
    blog:'/jedalnicek-na-mieru-zadarmo', offer:false },
  analyza:{ ic:'📊', tier:'Silver', title:'Metabolická analýza (Tanita)',
    sub:'Prestaň hádať, či to funguje. Začni to vidieť — týždeň po týždni.',
    what:['📉 <b>% telesného tuku</b> a <b>bazálny metabolizmus</b> — koľko kalórií reálne potrebuješ','💪 <b>svalová hmota</b> — či cvičíš správne, alebo si sval nechtiac spaľuješ','🧬 <b>viscerálny tuk</b> (okolo orgánov — ten najnebezpečnejší) a <b>hydratácia</b>','📱 všetko <b>v mobile</b>, priebežne — vidíš svoju krivku ísť správnym smerom'],
    why:'Váha ti klame — dôležité nie je číslo, ale <b>či pálíš tuk a nie sval</b>. Profesionálna analýza na váhe <b>Tanita</b> ti za pár sekúnd ukáže pravdu o tvojom tele. To je rozdiel medzi „snažím sa" a „viem, že napredujem".',
    blog:'/metabolicka-analyza-fit-premena', offer:true },
  online:{ ic:'💻', tier:'Silver', title:'Online hodiny LIVE',
    sub:'Cvič naživo z domu — kedy sa ti hodí, aj o 22:00 v pyžame.',
    what:['🛋️ tancuj z obývačky, keď nestíhaš prísť do štúdia','🌧️ dážď, choré dieťa, dlho v práci? <b>Žiadna vynechaná hodina</b>','✈️ zacvičíš aj na dovolenke či keď je vonku −10 °C','🔁 <b>konzistencia</b> — presne tá, čo robí skutočné premeny'],
    why:'Najväčší zabijak výsledkov nie je zlý tréning — je to <b>vynechaný tréning</b>. So Silver máš online hodiny stále po ruke, takže cvičíš vtedy, keď <i>ty</i> môžeš.',
    blog:'', offer:true },
  f1:{ ic:'🥤', tier:'Gold', title:'Herbalife F1 raňajky',
    sub:'Kompletná výživa za menej, než stoja párky.',
    what:['~220 kcal · <b>18 g bielkovín</b> · <b>23 vitamínov a minerálov</b>','príprava 30 sekúnd · zasýti na 3–4 hodiny','~<b>1,50 € / porcia</b> — lacnejšie ako bežné raňajky (2–4 €)','Herbalife: 45 rokov, 90+ krajín, certifikát Informed Sport, bez GMO'],
    why:'„Brušáky sa robia v kuchyni." Až <b>80 % výsledku je o tom, čím telo kŕmiš</b>. F1 je najvýživnejšie jedlo, aké si za tie peniaze vieš dať — a v <b>Gold členstve ho máš v cene</b>.',
    blog:'/f1-koktejl-ranajky-ktore-ti-zmenia-den', offer:false },
};
const p=new URLSearchParams(location.search).get('f');
const d=F[p]||F.analyza;
const isSilver = d.tier==='Silver';
const offerHtml = isSilver ? `<div class="offer"><div class="big">🎁 Vyskúšaj Silver mesiac zadarmo!</div><p style="margin:8px 0 0;font-size:.9rem;color:var(--cream)">Aktivujeme ti Silver <b>hneď a bez platby</b> — máš ho do konca aktuálneho obdobia za cenu Bronzu. <b>Silver sa začne účtovať až od ďalšieho obnovenia</b> členstva. Nič teraz nedoplácaš.</p></div>` : '';
const ctaHtml = isSilver
  ? `<button class="cta" id="tryBtn" onclick="tryS()">✨ Aktivovať Silver na skúšku (zdarma)</button>`
  : `<a class="cta" href="/pricing">Prejsť na Gold 🏆</a>`;
document.getElementById('content').innerHTML = `
  <div class="hero"><div class="ic">${d.ic}</div></div>
  <div style="text-align:center"><span class="lockpill"><i class="bi bi-lock-fill"></i> Odomkne sa v členstve ${d.tier}</span></div>
  <h1 style="text-align:center">${d.title}</h1>
  <p class="sub">${d.sub}</p>
  <div class="card"><h3>Čo dostaneš</h3><ul>${d.what.map(x=>`<li>${x}</li>`).join('')}</ul></div>
  <div class="card"><h3>Prečo je to dôležité</h3><p style="margin:0;font-size:.93rem">${d.why}</p></div>
  ${offerHtml}
  ${ctaHtml}
  <div id="tryMsg" style="text-align:center;font-size:.85rem;margin:-2px 0 10px"></div>
  ${d.blog?`<a class="blog" href="${BLOG}${d.blog}">📖 Prečítaj si viac na našom blogu →</a>`:''}
`;
document.title = d.title + ' – Fusion Academy';
async function tryS(){
  const btn=document.getElementById('tryBtn'), msg=document.getElementById('tryMsg');
  btn.disabled=true; btn.textContent='⏳ Aktivujem…'; msg.textContent='';
  try{
    const r=await fetch('/api/membership/try-silver',{method:'POST',credentials:'include'});
    const j=await r.json();
    if(j.ok){ btn.style.display='none'; msg.style.color='#8bd06a'; msg.innerHTML='✅ <b>Silver aktivovaný!</b> Máš ho zadarmo do '+(j.until||'konca obdobia')+'. Presmerovávam…'; setTimeout(()=>location.href='/client-dashboard',1800); return; }
    if(j.error==='no_membership'||j.error==='not_bronze'){ msg.style.color='#e0c070'; msg.innerHTML='Skúšku vieme aktivovať len Bronze členom. <a href="/pricing" style="color:var(--gold)">Pozri členstvá →</a>'; btn.style.display='none'; return; }
    msg.style.color='#e57373'; msg.textContent=j.error||'Nepodarilo sa'; btn.disabled=false; btn.textContent='✨ Aktivovať Silver na skúšku (zdarma)';
  }catch{ msg.style.color='#e57373'; msg.textContent='Chyba pripojenia'; btn.disabled=false; btn.textContent='✨ Aktivovať Silver na skúšku (zdarma)'; }
}
window.tryS=tryS;
</script>
</body>
</html>
